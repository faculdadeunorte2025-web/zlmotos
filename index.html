  bottom: -8px; right: 14px;
  border-left: 8px solid transparent;
  border-right: 0px solid transparent;
  border-top: 8px solid rgba(37,99,176,.9);
}

.zl-chat-hname { font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:3px; color:var(--azul-neon); }
.zl-chat-hsub { font-size:.65rem; color:var(--cinza); letter-spacing:1px; }
.zl-chat-status { width:8px; height:8px; border-radius:50%; background:var(--verde); box-shadow:0 0 6px var(--verde); animation:piscar 2s infinite; }
#zl-chat-close { background:none; border:none; color:var(--cinza); font-size:1.1rem; cursor:pointer; padding:4px; line-height:1; }
#zl-chat-close:hover { color:var(--branco); }

#zl-chat-msgs {
  flex:1; padding:14px 14px 8px; overflow-y:auto; max-height:340px;
  display:flex; flex-direction:column; gap:10px;
  scrollbar-width:thin; scrollbar-color:var(--azul-brilho) transparent;
}
.zl-msg { display:flex; gap:8px; align-items:flex-end; }
.zl-msg.user { flex-direction:row-reverse; }
.zl-msg-avatar { width:28px; height:50px; object-fit:cover; object-position:top; border-radius:6px; flex-shrink:0; }
.zl-msg-bubble {
  max-width:240px; padding:9px 13px; border-radius:14px;
  font-size:.82rem; line-height:1.45; letter-spacing:.3px;
}
.zl-msg.bot .zl-msg-bubble {
  background:rgba(26,58,107,.8); border:1px solid rgba(59,130,246,.25);
  color:var(--branco); border-bottom-left-radius:4px;
}
.zl-msg.user .zl-msg-bubble {
  background:linear-gradient(135deg,var(--azul-brilho),var(--azul-claro));
  color:white; border-bottom-right-radius:4px;
}
.zl-msg-bubble b { color:var(--azul-neon); }
.zl-msg-bubble .zl-tag {
  display:inline-block; background:rgba(59,130,246,.15); border:1px solid rgba(59,130,246,.3);
  border-radius:8px; padding:2px 7px; font-size:.72rem; color:var(--azul-neon);
  margin:2px 2px 0 0; cursor:pointer;
}
.zl-msg-bubble .zl-tag:hover { background:rgba(59,130,246,.28); }

#zl-chat-input-area {
  display:flex; gap:8px; padding:10px 12px;
  border-top:1px solid rgba(59,130,246,.15);
  background:rgba(5,11,20,.5);
}
#zl-chat-input {
  flex:1; background:rgba(10,22,40,.9); border:1px solid rgba(59,130,246,.3);
  border-radius:10px; color:var(--branco); font-family:'Rajdhani',sans-serif;
  font-size:.85rem; padding:8px 12px; outline:none; transition:border-color .2s;
}
#zl-chat-input:focus { border-color:var(--azul-brilho); }
#zl-chat-input::placeholder { color:rgba(148,163,184,.4); }
#zl-chat-send {
  width:36px; height:36px; border-radius:10px; border:none; cursor:pointer;
  background:linear-gradient(135deg,var(--azul-brilho),var(--azul-claro));
  color:white; font-size:1rem; display:flex; align-items:center; justify-content:center;
  transition:transform .15s; flex-shrink:0;
}
#zl-chat-send:hover { transform:scale(1.08); }

.zl-chat-typing {
  display:flex; gap:4px; align-items:center; padding:4px 6px;
}
.zl-chat-typing span {
  width:6px; height:6px; border-radius:50%; background:var(--azul-neon); opacity:.5;
  animation:typingDot .9s infinite;
}
.zl-chat-typing span:nth-child(2) { animation-delay:.2s; }
.zl-chat-typing span:nth-child(3) { animation-delay:.4s; }
@keyframes typingDot { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px);opacity:1} }

.zl-notif {
  position:absolute; top:-4px; right:-4px; width:16px; height:16px;
  border-radius:50%; background:var(--vermelho); color:white;
  font-size:.55rem; font-weight:700; display:flex; align-items:center; justify-content:center;
  animation:piscar 1s infinite;
}
</style>

const ZL_MASCOTE_IS_VIDEO = true;
let zlChatAberto = false;
let zlChatIniciado = false;

function zlChatToggle() {
  zlChatAberto = !zlChatAberto;
  const box = document.getElementById('zl-chat-box');
  const btn = document.getElementById('zl-chat-btn');
  box.style.display = zlChatAberto ? 'flex' : 'none';
  btn.style.display = zlChatAberto ? 'none' : 'flex';
  if (zlChatAberto && !zlChatIniciado) {
    zlChatIniciado = true;
    zlMsgBot('Olá! 👋 Sou o <b>Jean</b>, assistente da <b>ZL Motos</b>. Como posso ajudar?<br><br>' +
      '<span class="zl-tag" onclick="zlChatPergunta(this)">📋 Orçamentos</span>' +
      '<span class="zl-tag" onclick="zlChatPergunta(this)">📦 Estoque</span>' +
      '<span class="zl-tag" onclick="zlChatPergunta(this)">💰 Financeiro</span>' +
      '<span class="zl-tag" onclick="zlChatPergunta(this)">⚠ Alertas</span>');
  }
  if (zlChatAberto) setTimeout(() => document.getElementById('zl-chat-input').focus(), 300);
}

function zlJeanAceno() {
  const btn = document.getElementById('zl-chat-btn');
  if (!btn || zlChatAberto) return;

  // Reproduzir vídeo do Jean uma vez
  const vid = document.getElementById('jean-video-btn');
  if (vid) {
    vid.loop = false;
    vid.currentTime = 0;
    vid.play().catch(() => {});
    // Parar e voltar ao frame inicial ao terminar
    const onEnd = () => {
      vid.pause();
      vid.currentTime = 0;
      vid.removeEventListener('ended', onEnd);
    };
    vid.removeEventListener('ended', vid._jeanEndHandler || (() => {}));
    vid._jeanEndHandler = onEnd;
    vid.addEventListener('ended', onEnd);
  }

  // Bolha "Oi!"
  const bolha = document.createElement('div');
  bolha.className = 'jean-bolha-oi';
  bolha.innerHTML = 'Oi! 👋 Precisando de algo?';
  document.body.appendChild(bolha);

  // Anima botão
  btn.classList.add('jean-animando');

  // Remove tudo após animação
  setTimeout(() => {
    btn.classList.remove('jean-animando');
    bolha.remove();
  }, 2800);
}

function zlChatPergunta(el) {
  document.getElementById('zl-chat-input').value = el.textContent.replace(/^[^a-zA-ZÀ-ú]+/,'').trim();
  zlChatEnviar();
}

function zlMsgUser(txt) {
  const msgs = document.getElementById('zl-chat-msgs');
  msgs.innerHTML += `<div class="zl-msg user"><div class="zl-msg-bubble">${txt}</div></div>`;
  msgs.scrollTop = msgs.scrollHeight;
}

function zlMsgBot(txt, delay=600) {
  const msgs = document.getElementById('zl-chat-msgs');
  // Typing indicator
  const tid = 'typing_'+Date.now();
  msgs.innerHTML += `<div class="zl-msg bot" id="${tid}">
    ${ZL_MASCOTE_IS_VIDEO ? `<video class="zl-msg-avatar" src="${ZL_MASCOTE}" muted playsinline style="border-radius:6px"></video>` : `<img class="zl-msg-avatar" src="${ZL_MASCOTE}" alt="ZL"/>`}
    <div class="zl-msg-bubble"><div class="zl-chat-typing"><span></span><span></span><span></span></div></div>
  </div>`;
  msgs.scrollTop = msgs.scrollHeight;
  setTimeout(() => {
    const el = document.getElementById(tid);
    if (el) el.outerHTML = `<div class="zl-msg bot">
      ${ZL_MASCOTE_IS_VIDEO ? `<video class="zl-msg-avatar" src="${ZL_MASCOTE}" muted playsinline style="border-radius:6px"></video>` : `<img class="zl-msg-avatar" src="${ZL_MASCOTE}" alt="ZL"/>`}
      <div class="zl-msg-bubble">${txt}</div>
    </div>`;
    msgs.scrollTop = msgs.scrollHeight;
  }, delay);
}

function zlChatEnviar() {
  const inp = document.getElementById('zl-chat-input');
  const txt = inp.value.trim();
  if (!txt) return;
  inp.value = '';
  zlMsgUser(txt);
  setTimeout(() => zlChatResponder(txt), 300);
}

document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('zl-chat-input');
  if (inp) inp.addEventListener('keydown', e => { if(e.key==='Enter') zlChatEnviar(); });
});

                   q.match(/orc[.\s]+([a-z]+)/i) ||

      let encontrados = orcamentos;
      if (nome && nome.length > 2) {
        const nLow = nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
        encontrados = orcamentos.filter(o =>
          (o.cliente||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').includes(nLow)
        );
      }
      if (encontrados.length === 0) {
        zlMsgBot(`Não encontrei orçamento para "<b>${nome||'esse cliente'}</b>". Verifique o nome ou crie um novo orçamento.`);
      } else if (encontrados.length === 1) {
        const o = encontrados[0];
        const dias = Math.floor((Date.now() - new Date(o.criadoEm).getTime()) / 86400000);
        const statusEmoji = {pendente:'⏳',enviado:'📤',aceito:'✅'}[o.status]||'⏳';
        zlMsgBot(`📋 <b>Orçamento — ${o.cliente}</b><br>
🏍️ ${o.veiculo||'Veículo não informado'}<br>
📅 ${o.data ? new Date(o.data+'T12:00:00').toLocaleDateString('pt-BR') : '—'}<br>
💰 Total: <b>${fmt((o.calc && o.calc.total)||0)}</b><br>
${statusEmoji} Status: <b>${(o.status||'pendente').toUpperCase()}</b><br>
🕐 Criado há ${dias} dia(s)<br><br>
<span class="zl-tag" onclick="abaAtiva=13;renderAll();zlChatToggle()">Ver Orçamentos</span>`);
      } else {
        let lista = encontrados.slice(0,5).map(o =>
          `• <b>${o.cliente}</b> — ${fmt((o.calc && o.calc.total)||0)} — ${(o.status||'pendente').toUpperCase()}`
        ).join('<br>');
        if (encontrados.length > 5) lista += `<br><i>...e mais ${encontrados.length-5}</i>`;
        zlMsgBot(`Encontrei <b>${encontrados.length}</b> orçamento(s):<br><br>${lista}<br><br>
<span class="zl-tag" onclick="abaAtiva=13;renderAll();zlChatToggle()">Ver todos</span>`);
      }
    } else {
      zlMsgBot('Nenhum orçamento salvo ainda. <span class="zl-tag" onclick="abaAtiva=13;renderAll();zlChatToggle()">Criar orçamento</span>');
    }
    return;
  }

  // ── ESTOQUE ──
  if (q.includes('estoque') || q.includes('peca') || q.includes('quantidade') || q.includes('item')) {
    if (typeof estoque !== 'undefined') {
      const resumo = estCalcResumo();
      const zerados = estoque.filter(p => (parseFloat(p.qtd)||0) === 0);
      const alertas = estoque.filter(p => {
        const qtd = parseFloat(p.qtd)||0; const min = parseFloat(p.minimo)||0;
        return qtd > 0 && qtd <= min;
      });

      // Busca por nome de peça específica
      const palavras = txt.split(/\s+/).filter(w => w.length > 3);
      const pecaEspec = estoque.find(p =>
        palavras.some(w => p.nome.toLowerCase().includes(w.toLowerCase()))
      );

      if (pecaEspec) {
        const qtd = parseFloat(pecaEspec.qtd)||0;
        const min = parseFloat(pecaEspec.minimo)||0;
        const status = qtd === 0 ? '⛔ Zerado' : qtd <= min ? '⚠ Baixo' : '✅ OK';
        zlMsgBot(`📦 <b>${pecaEspec.nome}</b><br>
Categoria: ${pecaEspec.cat}<br>
Quantidade: <b>${qtd}</b> | Mínimo: ${min||'—'}<br>
Status: ${status}<br>
Custo: ${pecaEspec.custo ? fmt(pecaEspec.custo) : '—'} | Venda: ${pecaEspec.venda ? fmt(pecaEspec.venda) : '—'}`);
      } else {
        zlMsgBot(`📦 <b>Resumo do Estoque</b><br>
Total de itens: <b>${resumo.total}</b><br>
Valor em custo: <b>${fmt(resumo.totalCusto)}</b><br>
Valor em venda: <b>${fmt(resumo.totalVenda)}</b><br>
${zerados.length > 0 ? `⛔ <b>${zerados.length}</b> item(s) zerado(s): ${zerados.slice(0,3).map(p=>p.nome).join(', ')}${zerados.length>3?'...':''}` : '✅ Nenhum item zerado'}<br>
${alertas.length > 0 ? `⚠ <b>${alertas.length}</b> item(s) em alerta` : ''}<br><br>
<span class="zl-tag" onclick="abaAtiva=14;renderAll();zlChatToggle()">Ver Estoque</span>`);
      }
    } else {
      zlMsgBot('Estoque ainda não carregado.');
    }
    return;
  }

  // ── ALERTAS / ZERADO ──
  if (q.includes('alerta') || q.includes('zerado') || q.includes('faltando') || q.includes('acabou')) {
    if (typeof estoque !== 'undefined') {
      const zerados = estoque.filter(p => (parseFloat(p.qtd)||0) === 0);
      const alertas = estoque.filter(p => { const qtd=parseFloat(p.qtd)||0; const min=parseFloat(p.minimo)||0; return qtd>0&&qtd<=min; });
      if (zerados.length === 0 && alertas.length === 0) {
        zlMsgBot('✅ Tudo certo! Nenhum item zerado ou em alerta no momento.');
      } else {
        let resp = '';
        if (zerados.length) resp += `⛔ <b>Zerados (${zerados.length}):</b><br>${zerados.map(p=>`• ${p.nome}`).join('<br>')}<br><br>`;
        if (alertas.length) resp += `⚠ <b>Estoque baixo (${alertas.length}):</b><br>${alertas.map(p=>`• ${p.nome} (qtd: ${p.qtd})`).join('<br>')}`;
        resp += `<br><br><span class="zl-tag" onclick="abaAtiva=14;renderAll();zlChatToggle()">Ver Estoque</span>`;
        zlMsgBot(resp);
      }
    }
    return;
  }

  // ── FINANCEIRO / MÊS ──
  if (q.includes('financ') || q.includes('mes') || q.includes('faturamento') ||
      q.includes('lucro') || q.includes('entrada') || q.includes('saida') || q.includes('receita')) {
    if (typeof dados !== 'undefined' && typeof calcularMes !== 'undefined') {
      const meses = ['janeiro','fevereiro','marco','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
      let m = new Date().getMonth(); // mês atual por padrão
      meses.forEach((mn, i) => { if (q.includes(mn)) m = i; });
      // Verificar se mencionou "mês passado"
      if (q.includes('passado') || q.includes('anterior')) m = Math.max(0, m-1);
      const c = calcularMes(m);
      const MESES_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
      zlMsgBot(`💰 <b>Financeiro — ${MESES_PT[m]}</b><br>
📥 Entradas: <b>${fmt(c.totalBruto)}</b><br>
📤 Saídas: <b>${fmt(c.totalSaidas)}</b><br>
💵 Lucro Líquido: <b style="color:${c.totalLiquido>=0?'#34d399':'#fca5a5'}">${fmt(c.totalLiquido)}</b><br>
${c.vazio ? '⚠ Nenhum lançamento neste mês.' : ''}<br>
<span class="zl-tag" onclick="abaAtiva=${m};renderAll();zlChatToggle()">Ver ${MESES_PT[m]}</span>
<span class="zl-tag" onclick="abaAtiva=12;renderAll();zlChatToggle()">Ver Anual</span>`);
    }
    return;
  }

  // ── PENDENTES ──
  if (q.includes('pendente') || q.includes('aguardando') || q.includes('sem resposta')) {
    if (typeof orcamentos !== 'undefined') {
      const pend = orcamentos.filter(o => o.status === 'pendente' || !o.status);
      if (pend.length === 0) {
        zlMsgBot('✅ Nenhum orçamento pendente!');
      } else {
        const lista = pend.slice(0,5).map(o => `• <b>${o.cliente}</b> — ${fmt((o.calc && o.calc.total)||0)}`).join('<br>');
        zlMsgBot(`⏳ <b>${pend.length} orçamento(s) pendente(s):</b><br><br>${lista}<br><br>
<span class="zl-tag" onclick="abaAtiva=13;renderAll();zlChatToggle()">Ver todos</span>`);
      }
    }
    return;
  }

  // ── ACEITOS / VENDAS ──
  if (q.includes('aceito') || q.includes('aprovado') || q.includes('vendido') || q.includes('fechado')) {
    if (typeof orcamentos !== 'undefined') {
      const aceitos = orcamentos.filter(o => o.status === 'aceito');
      const total = aceitos.reduce((s,o) => s+((o.calc && o.calc.total)||0), 0);
      zlMsgBot(`✅ <b>${aceitos.length} orçamento(s) aceito(s)</b><br>Total faturado: <b>${fmt(total)}</b><br><br>
<span class="zl-tag" onclick="abaAtiva=13;renderAll();zlChatToggle()">Ver orçamentos</span>`);
    }
    return;
  }

  // ── AJUDA ──
  if (q.includes('ajuda') || q.includes('help') || q.includes('o que') || q.includes('como')) {
    zlMsgBot('Posso te ajudar com:<br><br>' +
      '📋 <b>Orçamentos</b> — "orçamento do João", "pendentes", "aceitos"<br>' +
      '📦 <b>Estoque</b> — "estoque", "zerados", "alerta", "óleo motor"<br>' +
      '💰 <b>Financeiro</b> — "financeiro maio", "lucro mês passado"<br>' +
      '⚠ <b>Alertas</b> — "o que está zerado", "o que está faltando"<br><br>' +
      '<span class="zl-tag" onclick="zlChatPergunta(this)">📋 Orçamentos</span>' +
      '<span class="zl-tag" onclick="zlChatPergunta(this)">📦 Estoque</span>' +
      '<span class="zl-tag" onclick="zlChatPergunta(this)">⚠ Zerados</span>');
    return;
  }

  // ── RESPOSTA PADRÃO ──
  zlMsgBot('Não entendi bem. Tente:<br>' +
    '<span class="zl-tag" onclick="zlChatPergunta(this)">orçamento do João</span> ' +
    '<span class="zl-tag" onclick="zlChatPergunta(this)">estoque</span> ' +
    '<span class="zl-tag" onclick="zlChatPergunta(this)">financeiro</span> ' +
    '<span class="zl-tag" onclick="zlChatPergunta(this)">zerados</span>');
}

let osContador = 0;

async function salvarOS() {
  try {
    const ref = window._firestoreDoc(window._db, 'zlmotos', 'os_lista');
    await window._firestoreSetDoc(ref, { lista: ordens, atualizadoEm: new Date().toISOString() });
    // Salva também contador
    const refCnt = window._firestoreDoc(window._db, 'zlmotos', 'os_contador');
    await window._firestoreSetDoc(refCnt, { valor: osContador });
  } catch(e) {
    console.warn('Erro ao salvar OS:', e);
    mostrarErro('Erro ao salvar OS — verifique conexão');
  }
}

async function osCarregarContador() {
  try {
    const ref = window._firestoreDoc(window._db, 'zlmotos', 'os_contador');
    const snap = await window._firestoreGetDoc(ref);
    if (snap.exists()) osContador = snap.data().valor || 0;
    else osContador = ordens.length;
  } catch(e) { osContador = ordens.length; }
}

function osNumeroFormatado(n) {
  return 'OS-' + String(n).padStart(3, '0');
}

async function osConverterOrcamento(orcId) {
  const orc = orcamentos.find(o => o.id === orcId);
  if (!orc) return;
  if (orc.status !== 'aceito') {
    mostrarErro('Aprove o orçamento primeiro antes de converter em OS');
    return;
  }
  const jaExiste = ordens.find(o => o.orcId === orcId);
  if (jaExiste) {
    mostrarToast('⚠ Já existe uma OS para este orçamento: ' + osNumeroFormatado(jaExiste.numero));
    abaAtiva = 15;
    renderAll();
    return;
  }
  await osCarregarContador();
  osContador++;
  const novaOS = {
    id: 'os_' + Date.now(),
    numero: osContador,
    orcId: orcId,
    cliente: orc.cliente || '',
    telefone: orc.telefone || '',
    veiculo: orc.veiculo || '',
    itens: JSON.parse(JSON.stringify(orc.itens || [])),
    total: ((orc.calc && orc.calc.total) != null && orc.calc.total > 0)
      ? orc.calc.total
      : (orc.itens||[]).reduce((s,it) => s + (parseFloat(it.qtd)||0)*(parseFloat(it.vunit)||0), 0),
    status: 'aberta',
    mecanico: '',
    dataEntrada: new Date().toISOString().split('T')[0],
    previsaoEntrega: '',
    obsInternas: '',
    obsCliente: orc.obs || '',
    checklist: (orc.itens || []).map((it, i) => ({ id: i, desc: it.desc || '—', cat: it.cat || '', feito: false })),
    criadoEm: new Date().toISOString()
  };
  ordens.unshift(novaOS);
  await salvarOS();
  mostrarToast('✓ OS ' + osNumeroFormatado(novaOS.numero) + ' criada com sucesso!');
  abaAtiva = 15;
  osAberta = novaOS.id;
  renderAll();
}

async function osSetStatus(id, status) {
  const os = ordens.find(o => o.id === id);
  if (!os) return;
  os.status = status;
  await salvarOS();
  renderAll();
  mostrarToast('✓ Status da OS atualizado');
}

function osCalcTotal(os) {
  if (!os || !Array.isArray(os.itens)) return 0;
  return os.itens.reduce((s, it) => s + (parseFloat(it.qtd)||0) * (parseFloat(it.vunit)||0), 0);
}

async function osSalvarCampo(id, campo, valor) {
  const os = ordens.find(o => o.id === id);
  if (!os) return;
  os[campo] = valor;
  // Sempre recalcula o total com base nos itens atuais
  os.total = osCalcTotal(os);
  await salvarOS();
}

async function osToggleChecklist(osId, itemId) {
  const os = ordens.find(o => o.id === osId);
  if (!os) return;
  // Garante que checklist existe e está sincronizado com itens
  if (!Array.isArray(os.checklist) || os.checklist.length === 0) {
    os.checklist = (os.itens || []).map((it, i) => ({ id: i, desc: it.desc || '—', cat: it.cat || '', feito: false }));
  }
  const item = os.checklist.find(c => c.id === itemId);
  if (item) item.feito = !item.feito;
  // Atualiza status automaticamente se todos feitos
  const todos = os.checklist.every(c => c.feito);
  if (todos && os.status === 'andamento') {
    os.status = 'concluida';
    mostrarToast('✅ Todos os itens concluídos! OS marcada como Concluída.');
  }
  await salvarOS();
  renderOS();
}


async function osExcluir(id) {
  const os = ordens.find(o => o.id === id);
  if (!os) return;
  confirmarExclusao('OS ' + osNumeroFormatado(os.numero), async () => {
    ordens = ordens.filter(o => o.id !== id);
    await salvarOS();
    renderAll();
    mostrarToast('✓ OS excluída');
  });
}

function osStatusBadge(status) {
  const mapa = {
    'aberta':     { cor: '#60a5fa', bg: 'rgba(96,165,250,.15)', icon: '🔵', txt: 'ABERTA' },
    'andamento':  { cor: '#fbbf24', bg: 'rgba(251,191,36,.15)',  icon: '⚙️', txt: 'EM ANDAMENTO' },
    'concluida':  { cor: '#34d399', bg: 'rgba(52,211,153,.15)', icon: '✅', txt: 'CONCLUÍDA' },
    'entregue':   { cor: '#a78bfa', bg: 'rgba(167,139,250,.15)', icon: '🏁', txt: 'ENTREGUE' },
    'cancelada':  { cor: '#f87171', bg: 'rgba(248,113,113,.15)', icon: '❌', txt: 'CANCELADA' }
  };
  const s = mapa[status] || mapa['aberta'];
  return `<span style="background:${s.bg};border:1px solid ${s.cor}40;color:${s.cor};padding:2px 8px;border-radius:10px;font-size:.65rem;letter-spacing:1px">${s.icon} ${s.txt}</span>`;
}

let osAberta = null; // OS sendo visualizada em detalhe

    return '<div style="text-align:center;padding:60px 20px;color:var(--cinza)">'

      + '<div style="font-family:\'Bebas Neue\';font-size:1.1rem;letter-spacing:3px;margin-bottom:8px">Nenhuma OS criada</div>'
      + '<div style="font-size:.85rem">Vá em Orçamentos, aprove um e clique em <b>Converter em OS</b></div>'
      + '</div>';
  }
  const rows = ordens.map(function(os, i) {
    const bg = i%2===0 ? '' : 'background:rgba(255,255,255,.02)';
    return '<tr style="' + bg + '">'
      + '<td style="padding:8px 12px;font-family:\'Share Tech Mono\';color:#a78bfa;font-weight:700">' + osNumeroFormatado(os.numero) + '</td>'
      + '<td style="padding:8px 12px;font-weight:600">' + (os.cliente||'—') + '</td>'
      + '<td style="padding:8px 12px;color:var(--cinza);font-size:.78rem;display:none" class="hide-mobile">' + (os.veiculo||'—') + '</td>'
      + '<td style="padding:8px 12px">' + osStatusBadge(os.status) + '</td>'
      + '<td style="padding:8px 12px;font-family:\'Share Tech Mono\';color:#6ee7b7">' + fmtN(osCalcTotal(os)) + '</td>'
      + '<td style="padding:8px 12px"><div style="display:flex;gap:4px;flex-wrap:wrap">'
      + '<button class="btn btn-sm btn-duplic" onclick="osAberta=\'' + os.id + '\';renderOS()">📋 Abrir</button>'
      + '<button class="btn btn-sm btn-pdf" onclick="osPDF(\'' + os.id + '\')">🖨️ PDF</button>'
      + '<button class="btn btn-del btn-sm" onclick="osExcluir(\'' + os.id + '\')">✕</button>'
      + '</div></td></tr>';
  }).join('');
  return '<div style="background:rgba(13,35,71,.6);border:1px solid var(--borda);border-radius:12px;overflow:hidden">'
    + '<table style="width:100%;font-size:.82rem;border-collapse:collapse">'
    + '<thead><tr style="background:rgba(26,58,107,.8)">'
    + '<th style="padding:10px 12px;text-align:left;font-size:.62rem;letter-spacing:2px;color:var(--cinza)">Nº OS</th>'
    + '<th style="padding:10px 12px;text-align:left;font-size:.62rem;letter-spacing:2px;color:var(--cinza)">Cliente</th>'
    + '<th style="padding:10px 12px;text-align:left;font-size:.62rem;letter-spacing:2px;color:var(--cinza);display:none" class="hide-mobile">Veículo</th>'
    + '<th style="padding:10px 12px;text-align:left;font-size:.62rem;letter-spacing:2px;color:var(--cinza)">Status</th>'
    + '<th style="padding:10px 12px;text-align:left;font-size:.62rem;letter-spacing:2px;color:var(--cinza)">Total</th>'
    + '<th style="padding:10px 12px;text-align:left;font-size:.62rem;letter-spacing:2px;color:var(--cinza)">Ações</th>'
    + '</tr></thead><tbody>' + rows + '</tbody></table></div>';
}

function renderOS() {
  const main = document.getElementById('mainContent');
  const fmtN = v => 'R$ ' + parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  const fmtD = d => { if(!d) return '—'; const dt = new Date(d+'T12:00:00'); return dt.toLocaleDateString('pt-BR'); };

  if (osAberta) {
    const os = ordens.find(o => o.id === osAberta);
    if (!os) { osAberta = null; renderOS(); return; }
    renderOSDetalhe(os);
    return;
  }

  main.innerHTML = `
    <div class="toolbar">
      <span style="font-family:'Bebas Neue';font-size:1.35rem;letter-spacing:3px;color:#a78bfa">🔧 Ordens de Serviço</span>
      <div class="toolbar-right">
        <span style="font-size:.78rem;color:var(--cinza)">${ordens.length} OS(s)</span>
      </div>
    </div>

    ${renderOSListaHTML(fmtN)}
  `;
}

function osRenderChecklist(os) {
  const cl = (Array.isArray(os.checklist) && os.checklist.length > 0)
    ? os.checklist
    : (os.itens || []).map(function(it, i) { return { id: i, desc: it.desc || '—', cat: it.cat || '', feito: false }; });
  if (!cl.length) return '';
  const total = cl.length;
  const feitos = cl.filter(function(c) { return c.feito; }).length;
  const pct = Math.round((feitos / total) * 100);
  const barColor = pct === 100 ? '#34d399' : pct >= 50 ? '#fbbf24' : '#60a5fa';
  const itensHtml = cl.map(function(c) {
    const bordaC = c.feito ? 'rgba(52,211,153,.35)' : 'var(--borda)';
    const bgC    = c.feito ? 'rgba(52,211,153,.08)' : 'rgba(255,255,255,.02)';
    const bordaBox = c.feito ? '#34d399' : 'rgba(255,255,255,.2)';
    const bgBox  = c.feito ? '#34d399' : 'transparent';
    const check  = c.feito ? '<span style="color:#0a1628;font-size:.75rem;font-weight:900">&#10003;</span>' : '';
    const txtColor = c.feito ? 'rgba(255,255,255,.4)' : 'var(--texto)';
    const txtDec   = c.feito ? 'line-through' : 'none';
    const catBadge = c.cat
      ? '<span style="font-size:.62rem;background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.2);color:var(--azul-neon);padding:1px 6px;border-radius:4px">' + c.cat + '</span>'
      : '';
    return '<div onclick="osToggleChecklist(\'' + os.id + '\',' + c.id + ')" style="cursor:pointer;display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;border:1px solid ' + bordaC + ';background:' + bgC + '">'
      + '<div style="width:20px;height:20px;border-radius:5px;border:2px solid ' + bordaBox + ';background:' + bgBox + ';display:flex;align-items:center;justify-content:center;flex-shrink:0">' + check + '</div>'
      + '<span style="flex:1;font-size:.85rem;color:' + txtColor + ';text-decoration:' + txtDec + '">' + c.desc + '</span>'
      + catBadge
      + '</div>';
  }).join('');
  return '<div style="background:rgba(13,35,71,.6);border:1px solid var(--borda);border-radius:12px;padding:14px 18px;margin-bottom:16px">'
    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'
    + '<div style="font-family:\'Bebas Neue\';font-size:.85rem;letter-spacing:3px;color:#a78bfa">&#10003; CHECKLIST DE EXECUÇÃO</div>'
    + '<div style="font-family:\'Share Tech Mono\';font-size:.8rem;color:' + barColor + '">' + feitos + '/' + total + ' concluídos</div>'
    + '</div>'
    + '<div style="background:rgba(255,255,255,.07);border-radius:999px;height:6px;margin-bottom:14px;overflow:hidden">'
    + '<div style="width:' + pct + '%;height:100%;background:' + barColor + ';border-radius:999px"></div>'
    + '</div>'
    + '<div style="display:flex;flex-direction:column;gap:6px">' + itensHtml + '</div>'
    + '</div>';
}

    {v:'entregue', l:'🏁 Entregue'},
    {v:'cancelada', l:'❌ Cancelada'}

    <div class="toolbar">
      <button class="btn btn-sm btn-duplic" onclick="osAberta=null;renderOS()">← Voltar</button>

      <div class="toolbar-right">
        <button class="btn" style="background:linear-gradient(135deg,#16a34a,#15803d);color:white;padding:9px 18px;font-size:.88rem" onclick="osWhatsApp('${os.id}')">📲 WhatsApp</button>

        <label>📞 Telefone</label>

      </div>
      <div class="orc-field">
        <label>🏍️ Veículo</label>

      </div>
      <div class="orc-field">
        <label>👨‍🔧 Mecânico</label>
        <input type="text" value="${(os.mecanico||'').replace(/"/g,'&quot;')}" placeholder="Nome do mecânico..." oninput="osSalvarCampo('${os.id}','mecanico',this.value)"/>
      </div>
      <div class="orc-field">
        <label>📅 Entrada</label>
        <input type="date" value="${os.dataEntrada||''}" oninput="osSalvarCampo('${os.id}','dataEntrada',this.value)"/>
      </div>
      <div class="orc-field">
        <label>🏁 Previsão Entrega</label>
        <input type="date" value="${os.previsaoEntrega||''}" oninput="osSalvarCampo('${os.id}','previsaoEntrega',this.value)"/>
      </div>
    </div>

    <!-- STATUS -->
    <div style="background:rgba(13,35,71,.6);border:1px solid var(--borda);border-radius:12px;padding:14px 18px;margin-bottom:16px">
      <div style="font-family:'Bebas Neue';font-size:.85rem;letter-spacing:3px;color:#a78bfa;margin-bottom:10px">STATUS DA OS</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${statusOpts.map(s => '<button class="btn btn-sm" style="' + (os.status===s.v?'background:#a78bfa22;border:1px solid #a78bfa;color:#a78bfa':'background:rgba(255,255,255,.05);border:1px solid var(--borda);color:var(--cinza)') + '" onclick="osSetStatus(\'' + os.id + '\',\'' + s.v + '\')">' + s.l + '</button>').join('')}
      </div>
    </div>

    <!-- ITENS -->
    <div style="background:rgba(13,35,71,.6);border:1px solid var(--borda);border-radius:12px;padding:14px 18px;margin-bottom:16px">
      <div style="font-family:'Bebas Neue';font-size:.85rem;letter-spacing:3px;color:#a78bfa;margin-bottom:10px">🔩 ITENS / SERVIÇOS</div>
      <table style="width:100%;font-size:.82rem">
        <thead><tr style="background:rgba(26,58,107,.6)">
          <th style="padding:6px 8px;text-align:left;font-size:.62rem;color:var(--cinza)">Descrição</th>
          <th style="padding:6px 8px;text-align:right;font-size:.62rem;color:var(--cinza)">Qtd</th>
          <th style="padding:6px 8px;text-align:right;font-size:.62rem;color:var(--cinza)">V.Unit</th>
          <th style="padding:6px 8px;text-align:right;font-size:.62rem;color:var(--cinza)">Subtotal</th>
        </tr></thead>
        <tbody>
          ${os.itens.map((it, i) => {
            const sub = (parseFloat(it.qtd)||0)*(parseFloat(it.vunit)||0);
            const bgRow = i%2===0 ? '' : 'background:rgba(255,255,255,.02)';
            const obsHtml = it.obs ? '<span style="font-size:.72rem;color:var(--cinza)"> — ' + it.obs + '</span>' : '';
            return '<tr style="' + bgRow + '">'
              + '<td style="padding:6px 8px">' + (it.desc||'—') + ' ' + obsHtml
              + '<div style="display:inline-block;margin-left:6px"><span style="font-size:.65rem;background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.2);color:var(--azul-neon);padding:1px 5px;border-radius:4px">' + (it.cat||'') + '</span></div></td>'
              + '<td style="padding:6px 8px;text-align:right;font-family:\'Share Tech Mono\'">' + (it.qtd||1) + '</td>'
              + '<td style="padding:6px 8px;text-align:right;font-family:\'Share Tech Mono\';color:var(--cinza)">R$ ' + parseFloat(it.vunit||0).toLocaleString('pt-BR',{minimumFractionDigits:2}) + '</td>'
              + '<td style="padding:6px 8px;text-align:right;font-family:\'Share Tech Mono\';color:#6ee7b7">R$ ' + sub.toLocaleString('pt-BR',{minimumFractionDigits:2}) + '</td>'
              + '</tr>';
          }).join('')}
        </tbody>
      </table>
      <div style="text-align:right;margin-top:10px;font-family:'Share Tech Mono';font-size:1rem;color:#34d399;font-weight:700">
        TOTAL: R$ ${osCalcTotal(os).toLocaleString('pt-BR',{minimumFractionDigits:2})}
      </div>
    </div>

    <!-- CHECKLIST DE EXECUÇÃO -->
    ${osRenderChecklist(os)}

    <!-- OBS -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
      <div class="orc-field">
        <label>📝 Observações Internas (mecânico)</label>
        <textarea rows="4" style="width:100%;resize:vertical" placeholder="Anotações técnicas, peças adicionais encontradas..." oninput="osSalvarCampo('${os.id}','obsInternas',this.value)">${os.obsInternas||''}</textarea>
      </div>
      <div class="orc-field">
        <label>💬 Observações para o Cliente</label>
        <textarea rows="4" style="width:100%;resize:vertical" placeholder="Recomendações, próxima revisão..." oninput="osSalvarCampo('${os.id}','obsCliente',this.value)">${os.obsCliente||''}</textarea>
      </div>
    </div>

    <!-- BOTÃO PDF DA OS -->
    <div style="display:flex;justify-content:flex-end;gap:10px;margin-bottom:24px">
      <button class="btn btn-pdf" onclick="osPDF('${os.id}')" style="padding:11px 28px;font-size:.95rem">🖨️ Gerar PDF desta OS</button>
    </div>
  `;
}

function osWhatsApp(id) {
  const os = ordens.find(o => o.id === id);
  if (!os) return;
  const fmtN = v => 'R$ ' + parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  const statusTxt = {aberta:'Em aberto',andamento:'Em andamento',concluida:'Concluída',entregue:'Entregue',cancelada:'Cancelada'};
  let txt = `🔧 *ORDEM DE SERVIÇO — ZL MOTOS*\n`;
  txt += `*${osNumeroFormatado(os.numero)}*\n\n`;
  txt += `👤 *Cliente:* ${os.cliente||'—'}\n`;
  txt += `🏍️ *Veículo:* ${os.veiculo||'—'}\n`;
  txt += `📋 *Status:* ${statusTxt[os.status]||os.status}\n\n`;
  txt += `🔩 *Serviços/Peças:*\n`;
  os.itens.forEach(it => {
    const sub = (parseFloat(it.qtd)||0)*(parseFloat(it.vunit)||0);
    txt += `• ${it.desc} (${it.qtd}x) — R$ ${sub.toLocaleString('pt-BR',{minimumFractionDigits:2})}\n`;
  });
  txt += `\n💰 *Total: ${fmtN(osCalcTotal(os))}*\n`;
  if (os.obsCliente) txt += `\n📝 *Obs:* ${os.obsCliente}\n`;
  txt += `\n_ZL MOTOS — Obrigado pela preferência!_`;
  const tel = (os.telefone||'').replace(/\D/g,'');
  const url = tel ? `https://wa.me/55${tel}?text=${encodeURIComponent(txt)}` : `https://wa.me/?text=${encodeURIComponent(txt)}`;
  window.open(url, '_blank');
}

function osPDF(id) {
  const os = ordens.find(o => o.id === id);
  if (!os) return;

  let jsPDF;
  try {
    jsPDF = (window.jspdf && window.jspdf.jsPDF) ? window.jspdf.jsPDF
          : (typeof jspdf !== 'undefined' && jspdf.jsPDF) ? jspdf.jsPDF
          : window.jsPDF || null;
  } catch(e) { jsPDF = null; }
  if (!jsPDF) { mostrarErro('Erro: jsPDF não carregado. Verifique sua conexão.'); return; }

  const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  const W = 210; let y = 0;
  const fmtN = v => 'R$ ' + parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  const fmtD = d => { if(!d) return '—'; try{ return new Date(d+'T12:00:00').toLocaleDateString('pt-BR'); }catch(e){return d;} };
  const statusTxt = {aberta:'EM ABERTO',andamento:'EM ANDAMENTO',concluida:'CONCLUÍDA',entregue:'ENTREGUE',cancelada:'CANCELADA'};

  // ── HEADER ──
  doc.setFillColor(10,22,40);
  doc.rect(0,0,W,36,'F');
  doc.setTextColor(167,139,250); doc.setFontSize(22); doc.setFont('helvetica','bold');
  doc.text('ZL MOTOS',W/2,13,{align:'center'});
  doc.setFontSize(9); doc.setTextColor(148,163,184);
  doc.text('ORDEM DE SERVIÇO',W/2,21,{align:'center'});
  doc.setFontSize(11); doc.setTextColor(255,255,255); doc.setFont('helvetica','bold');
  doc.text(osNumeroFormatado(os.numero),W/2,30,{align:'center'});
  y = 46;

  // ── STATUS BADGE ──
  const sColor = {aberta:[96,165,250],andamento:[251,191,36],concluida:[52,211,153],entregue:[167,139,250],cancelada:[248,113,113]};
  const sc = sColor[os.status] || [96,165,250];
  doc.setFillColor(sc[0],sc[1],sc[2]);
  doc.roundedRect(W/2-25,y-6,50,8,2,2,'F');
  doc.setTextColor(10,22,40); doc.setFontSize(7); doc.setFont('helvetica','bold');
  doc.text((statusTxt[os.status]||'').toUpperCase(), W/2, y-1, {align:'center'});
  y += 8;

  // ── INFO CLIENTE ──
  doc.setFillColor(13,35,71); doc.roundedRect(14,y,55,22,3,3,'F');
  doc.roundedRect(75,y,65,22,3,3,'F');
  doc.roundedRect(146,y,50,22,3,3,'F');
  doc.setFontSize(7); doc.setTextColor(148,163,184); doc.setFont('helvetica','normal');
  doc.text('CLIENTE',20,y+6); doc.text('VEÍCULO / MODELO',81,y+6); doc.text('TELEFONE',152,y+6);
  doc.setFontSize(8.5); doc.setFont('helvetica','bold'); doc.setTextColor(240,246,255);
  doc.text(os.cliente||'—',20,y+14,{maxWidth:44});
  doc.text(os.veiculo||'—',81,y+14,{maxWidth:54});
  doc.text(os.telefone||'—',152,y+14,{maxWidth:40});
  y += 32;

  // ── DATAS / MECÂNICO ──
  doc.setFillColor(20,40,80); doc.roundedRect(14,y,55,14,2,2,'F');
  doc.roundedRect(75,y,55,14,2,2,'F');
  doc.roundedRect(136,y,60,14,2,2,'F');
  doc.setFontSize(6.5); doc.setTextColor(148,163,184); doc.setFont('helvetica','normal');
  doc.text('ENTRADA',20,y+5); doc.text('PREVISÃO ENTREGA',81,y+5); doc.text('MECÂNICO',142,y+5);
  doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(240,246,255);
  doc.text(fmtD(os.dataEntrada),20,y+11);
  doc.text(fmtD(os.previsaoEntrega),81,y+11);
  doc.text(os.mecanico||'—',142,y+11,{maxWidth:50});
  y += 24;

  // ── TABELA ITENS ──
  doc.setFillColor(26,58,107); doc.rect(14,y,182,8,'F');
  doc.setFontSize(7.5); doc.setFont('helvetica','bold'); doc.setTextColor(255,255,255);
  doc.text('DESCRIÇÃO',16,y+5.5);
  doc.text('CAT.',100,y+5.5);
  doc.text('QTD',122,y+5.5,{align:'right'});
  doc.text('V. UNIT.',155,y+5.5,{align:'right'});
  doc.text('SUBTOTAL',196,y+5.5,{align:'right'});
  y += 11;

  doc.setFont('helvetica','normal'); doc.setFontSize(8.5);
  os.itens.forEach((it, i) => {
    if (y > 220) { doc.addPage(); y = 20; }
    const sub = (parseFloat(it.qtd)||0)*(parseFloat(it.vunit)||0);
    if (i%2===0) { doc.setFillColor(13,35,71); doc.rect(14,y-3,182,7,'F'); }
    doc.setTextColor(i%2===0?200:180, i%2===0?220:200, i%2===0?255:240);
    doc.text(it.desc||'—',16,y+1,{maxWidth:80});
    doc.setFontSize(7); doc.setTextColor(148,163,184);
    doc.text(it.cat||'',100,y+1);
    doc.setFontSize(8.5); doc.setTextColor(i%2===0?200:180, i%2===0?220:200, i%2===0?255:240);
    doc.text(String(it.qtd||1),122,y+1,{align:'right'});
    doc.text('R$ '+parseFloat(it.vunit||0).toLocaleString('pt-BR',{minimumFractionDigits:2}),155,y+1,{align:'right'});
    doc.setTextColor(134,239,172);
    doc.text('R$ '+sub.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}),196,y+1,{align:'right'});
    if (it.obs) {
      y += 6;
      doc.setFontSize(7); doc.setTextColor(148,163,184); doc.setFont('helvetica','italic');
      doc.text('  '+it.obs,16,y+1,{maxWidth:180});
      doc.setFont('helvetica','normal'); doc.setFontSize(8.5);
    }
    y += 8;
    doc.setDrawColor(20,40,80); doc.line(14,y-2,196,y-2);
  });

  // ── TOTAL ──
  // Recalcula o total direto dos itens para garantir valor correto
  const totalCalculado = osCalcTotal(os);
  y += 4;
  doc.setFillColor(16,58,40); doc.roundedRect(130,y-4,66,12,2,2,'F');
  doc.setFontSize(10); doc.setFont('helvetica','bold'); doc.setTextColor(52,211,153);
  doc.text('TOTAL:',134,y+4);
  doc.text('R$ '+totalCalculado.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}),196,y+4,{align:'right'});
  y += 16;

  // ── OBS INTERNAS ──
  if (os.obsInternas) {
    if (y>240){doc.addPage();y=20;}
    doc.setFillColor(13,35,71); doc.roundedRect(14,y,182,6+(doc.splitTextToSize(os.obsInternas,170).length*4.5),2,2,'F');
    doc.setFontSize(7.5); doc.setFont('helvetica','bold'); doc.setTextColor(148,163,184);
    doc.text('📋 OBSERVAÇÕES TÉCNICAS (INTERNO):',16,y+5);
    y += 9;
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(200,220,255);
    const obsLines = doc.splitTextToSize(os.obsInternas,178);
    doc.text(obsLines,16,y);
    y += obsLines.length*4.5+8;
  }

  // ── OBS CLIENTE ──
  if (os.obsCliente) {
    if (y>240){doc.addPage();y=20;}
    doc.setFontSize(7.5); doc.setFont('helvetica','bold'); doc.setTextColor(148,163,184);
    doc.text('💬 OBSERVAÇÕES AO CLIENTE:',16,y+2);
    y += 7;
    doc.setFont('helvetica','italic'); doc.setFontSize(8); doc.setTextColor(180,200,240);
    const obsC = doc.splitTextToSize(os.obsCliente,178);
    doc.text(obsC,16,y);
    y += obsC.length*4.5+8;
  }

  // ── ASSINATURAS ──
  if (y>250){doc.addPage();y=20;}
  doc.setDrawColor(40,70,120); doc.line(14,y,196,y);
  y += 10;
  doc.setLineWidth(0.3); doc.setDrawColor(60,90,120);
  doc.line(14,y,90,y);
  doc.line(110,y,196,y);
  doc.setFontSize(6.5); doc.setTextColor(100,120,150); doc.setFont('helvetica','normal');
  doc.text('Assinatura do Cliente',14,y+5);
  doc.text('Assinatura do Responsável / Mecânico',110,y+5);

  // ── RODAPÉ ──
  doc.setFontSize(7); doc.setTextColor(60,90,130);
  doc.text('ZL MOTOS — '+osNumeroFormatado(os.numero)+' — Gerada em '+new Date().toLocaleDateString('pt-BR'),W/2,297,{align:'center'});

  const nomeArq = `ZL_MOTOS_${osNumeroFormatado(os.numero)}_${(os.cliente||'cliente').replace(/\s+/g,'_')}.pdf`;
  try {
    const blob = doc.output('blob');
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = nomeArq;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  } catch(e) {
    try { doc.save(nomeArq); } catch(e2) { mostrarErro('Erro ao gerar PDF da OS.'); }
  }
}
</script>
