<style>
:root {
  --azul-escuro: #0a1628;
  --azul-medio: #0d2347;
  --azul-principal: #1a3a6b;
  --azul-claro: #2563b0;
  --azul-brilho: #3b82f6;
  --azul-neon: #60a5fa;
  --dourado: #f59e0b;
  --verde: #10b981;
  --vermelho: #ef4444;
  --branco: #f0f6ff;
  --cinza: #94a3b8;
  --borda: rgba(59,130,246,0.25);
}
* { margin:0; padding:0; box-sizing:border-box; }

/* ═══ LOGIN ═══ */
#login-screen {
  position:fixed; inset:0; z-index:999998;
  display:flex; align-items:center; justify-content:center;
  background: radial-gradient(ellipse at 30% 20%,rgba(37,99,176,.25),transparent 60%),
              radial-gradient(ellipse at 70% 80%,rgba(245,158,11,.08),transparent 50%),
              linear-gradient(135deg,#050b14,#0a1628,#08111f);
}
#login-screen::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(59,130,246,.04) 40px),
    repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(59,130,246,.04) 40px);
}
.login-box {
  position:relative;
  background:linear-gradient(135deg,rgba(13,35,71,.95),rgba(26,58,107,.7));
  border:1px solid rgba(59,130,246,.4); border-radius:16px;
  padding:48px 52px; width:420px;
  box-shadow:0 0 60px rgba(59,130,246,.15),0 0 120px rgba(59,130,246,.08),inset 0 1px 0 rgba(255,255,255,.05);
  animation:loginEntrada .6s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes loginEntrada { from{opacity:0;transform:translateY(30px) scale(.95)} to{opacity:1;transform:translateY(0) scale(1)} }
.login-box::before {
  content:''; position:absolute; top:0;left:0;right:0; height:2px; border-radius:16px 16px 0 0;
  background:linear-gradient(90deg,transparent,var(--azul-neon),var(--dourado),var(--azul-neon),transparent);
}
.login-logo { font-family:'Bebas Neue',sans-serif; font-size:3.2rem; letter-spacing:8px; color:var(--branco); text-shadow:0 0 30px rgba(96,165,250,.5); text-align:center; margin-bottom:4px; }
.login-logo span { color:var(--dourado); text-shadow:0 0 20px rgba(245,158,11,.6); }
.login-sub { text-align:center; font-size:.72rem; color:var(--azul-neon); letter-spacing:4px; text-transform:uppercase; margin-bottom:36px; }
.login-field { margin-bottom:18px; }
.login-field label { display:block; font-size:.7rem; letter-spacing:2.5px; text-transform:uppercase; color:var(--cinza); margin-bottom:8px; font-weight:600; }
.login-field input { width:100%; background:rgba(10,22,40,.8); border:1px solid rgba(59,130,246,.3); border-radius:8px; color:var(--branco); font-family:'Rajdhani',sans-serif; font-size:1rem; font-weight:600; padding:12px 16px; outline:none; transition:border-color .2s,box-shadow .2s; }
.login-field input[type="password"] { font-family:'Share Tech Mono',monospace; letter-spacing:4px; font-size:1.1rem; }
.login-field input:focus { border-color:var(--azul-brilho); box-shadow:0 0 0 3px rgba(59,130,246,.15); }
.login-erro { background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.4); border-radius:8px; padding:10px 14px; color:#fca5a5; font-size:.8rem; letter-spacing:1px; text-align:center; margin-bottom:16px; display:none; }
.login-erro.visivel { display:block; animation:shake .4s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
.btn-login { width:100%; padding:14px; background:linear-gradient(135deg,var(--azul-brilho),var(--azul-claro)); border:none; border-radius:8px; color:white; font-family:'Bebas Neue',sans-serif; font-size:1.2rem; letter-spacing:4px; cursor:pointer; transition:all .2s; box-shadow:0 4px 20px rgba(59,130,246,.3); margin-top:8px; }
.btn-login:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(59,130,246,.45); }
.btn-criar { width:100%; padding:12px; background:transparent; border:1px solid rgba(59,130,246,.4); border-radius:8px; color:var(--azul-neon); font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:4px; cursor:pointer; transition:all .2s; margin-top:10px; }
.btn-criar:hover { background:rgba(59,130,246,.1); border-color:var(--azul-brilho); }
.login-divisor { display:flex; align-items:center; gap:10px; margin:16px 0 6px; }
.login-divisor span { font-size:.65rem; color:rgba(148,163,184,.35); letter-spacing:2px; white-space:nowrap; }
.login-divisor::before,.login-divisor::after { content:''; flex:1; height:1px; background:rgba(59,130,246,.15); }
.login-dica { text-align:center; margin-top:20px; font-size:.7rem; color:rgba(148,163,184,.4); letter-spacing:1px; }

/* ═══ INTRO ═══ */
#intro-zl { position:fixed; inset:0; z-index:999999; overflow:hidden; background:radial-gradient(circle at center,rgba(37,99,176,.15),transparent 60%),linear-gradient(135deg,#050b14,#0a1628,#08111f); animation:removerIntro .8s ease forwards; animation-delay:3.2s; }
@keyframes removerIntro { to{opacity:0;visibility:hidden} }
.logo-animada { position:absolute; top:50%; left:-600px; transform:translateY(-50%); font-family:'Bebas Neue',sans-serif; font-size:7rem; letter-spacing:14px; white-space:nowrap; color:white; text-shadow:0 0 20px rgba(255,255,255,.3),0 0 40px rgba(59,130,246,.6),0 0 80px rgba(59,130,246,.4); animation:acelerarLogo 3s cubic-bezier(.65,.05,.36,1) forwards; }
.logo-animada span { color:var(--dourado); text-shadow:0 0 20px rgba(245,158,11,.5),0 0 40px rgba(245,158,11,.6),0 0 70px rgba(245,158,11,.4); }
@keyframes acelerarLogo { 0%{left:-700px;transform:translateY(-50%) skewX(0deg);filter:blur(0)} 20%{left:15%;transform:translateY(-50%) skewX(-8deg)} 40%{left:35%;transform:translateY(-50%) skewX(-12deg)} 65%{left:52%;transform:translateY(-50%) skewX(-16deg)} 100%{left:130%;transform:translateY(-50%) skewX(-22deg);filter:blur(3px)} }
.fumaca { position:absolute; width:180px; height:180px; border-radius:50%; background:radial-gradient(circle,rgba(255,255,255,.18),transparent 70%); filter:blur(18px); opacity:0; top:50%; left:20%; transform:translateY(-50%); }
.fumaca1{animation:fumaçaAnim 2.2s ease-out infinite}
.fumaca2{animation:fumaçaAnim 2.4s ease-out infinite;animation-delay:.3s}
.fumaca3{animation:fumaçaAnim 2.6s ease-out infinite;animation-delay:.6s}
@keyframes fumaçaAnim { 0%{opacity:0;transform:translateY(-50%) scale(.4)} 20%{opacity:.5} 100%{opacity:0;transform:translate(-180px,-120px) scale(1.8)} }

/* ═══ APP ═══ */
#app { display:none; flex-direction:column; min-height:100vh; }
body { background:var(--azul-escuro); color:var(--branco); font-family:'Rajdhani',sans-serif; min-height:100vh; background-image:radial-gradient(ellipse at 20% 0%,rgba(37,99,176,.18),transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(10,22,40,.8),transparent 60%),repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(59,130,246,.04) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(59,130,246,.04) 40px); }

/* ═══ HEADER ═══ */
header { background:linear-gradient(135deg,var(--azul-medio),var(--azul-principal)); border-bottom:2px solid var(--azul-brilho); padding:14px 28px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 4px 32px rgba(59,130,246,.2); position:relative; overflow:hidden; }
header::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:linear-gradient(90deg,transparent,var(--azul-neon),var(--dourado),var(--azul-neon),transparent); }
.logo { font-family:'Bebas Neue',sans-serif; font-size:2.4rem; letter-spacing:6px; color:var(--branco); text-shadow:0 0 30px rgba(96,165,250,.5); line-height:1; }
.logo span { color:var(--dourado); }
.header-sub { font-size:.72rem; color:var(--azul-neon); letter-spacing:4px; text-transform:uppercase; margin-top:2px; }
.header-right { display:flex; align-items:center; gap:12px; }
.ano-badge { background:rgba(59,130,246,.15); border:1px solid var(--azul-brilho); border-radius:8px; padding:6px 16px; text-align:center; }
.ano-badge .ano-label { font-size:.65rem; color:var(--cinza); letter-spacing:2px; }
.ano-badge input.ano-input { font-family:'Share Tech Mono',monospace; font-size:1.5rem; color:var(--azul-neon); background:transparent; border:none; width:75px; text-align:center; outline:none; }

/* ═══ TIMEOUT BADGE ═══ */
.session-badge { background:rgba(245,158,11,.1); border:1px solid rgba(245,158,11,.3); border-radius:8px; padding:6px 14px; text-align:center; }
.session-badge .sl { font-size:.62rem; color:var(--cinza); letter-spacing:2px; }
.session-badge .sv { font-family:'Share Tech Mono',monospace; font-size:1.1rem; color:var(--dourado); }

.btn-hdr { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:7px; border:none; cursor:pointer; font-family:'Rajdhani',sans-serif; font-size:.8rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; transition:all .2s; }
.btn-logout { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); color:#fca5a5; }
.btn-logout:hover { background:rgba(239,68,68,.2); }
.btn-config { background:rgba(59,130,246,.1); border:1px solid rgba(59,130,246,.3); color:var(--azul-neon); }
.btn-config:hover { background:rgba(59,130,246,.2); }

/* ═══ TABS ═══ */
.tabs-container { background:var(--azul-medio); border-bottom:1px solid var(--borda); padding:0 24px; display:flex; gap:2px; overflow-x:auto; scrollbar-width:thin; scrollbar-color:var(--azul-brilho) transparent; }
.tab { padding:11px 16px; cursor:pointer; font-family:'Rajdhani',sans-serif; font-size:.82rem; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--cinza); border-bottom:3px solid transparent; white-space:nowrap; transition:all .2s; user-select:none; position:relative; }
.tab:hover { color:var(--branco); border-bottom-color:rgba(59,130,246,.4); }
.tab.active { color:var(--azul-neon); border-bottom-color:var(--azul-brilho); background:rgba(59,130,246,.08); }
.tab.tab-anual { color:var(--dourado); }
.tab.tab-anual.active { color:var(--dourado); border-bottom-color:var(--dourado); }
.tab.tab-hoje { color:var(--verde) !important; border-bottom-color:var(--verde) !important; }
.tab.tab-hoje::after { content:'●'; position:absolute; top:4px; right:3px; font-size:.45rem; color:var(--verde); }
.tab.tab-hoje.active { background:rgba(16,185,129,.08) !important; }
.tab-alerta { position:absolute; top:6px; right:4px; width:7px; height:7px; border-radius:50%; background:var(--vermelho); animation:piscar 1.5s infinite; }
@keyframes piscar { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ═══ ANIMAÇÃO LINHAS ═══ */
@keyframes fadeInRow { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
tbody tr { animation:fadeInRow .2s ease forwards; }

/* ═══ CARD LÍQUIDO PULSE ═══ */
@keyframes pulseGreen { 0%,100%{box-shadow:0 4px 20px rgba(16,185,129,.2)} 50%{box-shadow:0 4px 28px rgba(16,185,129,.5)} }
@keyframes pulseRed   { 0%,100%{box-shadow:0 4px 20px rgba(239,68,68,.2)}  50%{box-shadow:0 4px 28px rgba(239,68,68,.5)} }
.card-liquido-pos { animation:pulseGreen 2s infinite; }
.card-liquido-neg { animation:pulseRed   2s infinite; }

/* ═══ MAIN ═══ */
main { flex:1; padding:22px 28px; }

/* ═══ ALERTA MÊS ═══ */
.alerta-mes { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.35); border-radius:10px; padding:12px 18px; margin-bottom:18px; display:flex; align-items:center; gap:10px; font-size:.85rem; color:#fca5a5; letter-spacing:.5px; }
.alerta-liquido-neg { background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.3); border-radius:10px; padding:10px 16px; margin-bottom:16px; display:flex; align-items:center; gap:10px; font-size:.83rem; color:#fca5a5; }

/* ═══ TENDENCIA ═══ */
.tendencia-badge { display:inline-flex; align-items:center; gap:5px; font-size:.75rem; padding:3px 10px; border-radius:20px; margin-left:10px; font-family:'Share Tech Mono',monospace; }
.tend-up { background:rgba(16,185,129,.15); color:#34d399; border:1px solid rgba(16,185,129,.3); }
.tend-down { background:rgba(239,68,68,.15); color:#fca5a5; border:1px solid rgba(239,68,68,.3); }
.tend-igual { background:rgba(148,163,184,.1); color:var(--cinza); border:1px solid rgba(148,163,184,.2); }

/* ═══ CARDS ═══ */
.resumo-cards { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:22px; }
.card { background:linear-gradient(135deg,rgba(13,35,71,.9),rgba(26,58,107,.5)); border:1px solid var(--borda); border-radius:12px; padding:18px 22px; position:relative; overflow:hidden; transition:transform .2s,box-shadow .2s; }
.card:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(59,130,246,.15); }
.card::before { content:''; position:absolute; top:0;left:0;right:0; height:3px; }
.card.saidas::before { background:linear-gradient(90deg,var(--vermelho),#f97316); }
.card.bruto::before { background:linear-gradient(90deg,var(--azul-brilho),var(--azul-neon)); }
.card.liquido::before { background:linear-gradient(90deg,var(--verde),#34d399); }
.card-label { font-size:.7rem; letter-spacing:3px; text-transform:uppercase; color:var(--cinza); margin-bottom:6px; }
.card-valor { font-family:'Share Tech Mono',monospace; font-size:1.75rem; font-weight:700; }
.card.saidas .card-valor { color:var(--vermelho); }
.card.bruto .card-valor { color:var(--azul-neon); }
.card.liquido .card-valor { color:var(--verde); }
.card-icon { position:absolute; right:18px; top:50%; transform:translateY(-50%); font-size:2.2rem; opacity:.12; }
.card-sub { font-size:.68rem; color:var(--cinza); margin-top:4px; letter-spacing:.5px; }

/* ═══ SEÇÕES ═══ */
.secoes { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
.secao { background:rgba(13,35,71,.7); border:1px solid var(--borda); border-radius:12px; overflow:hidden; }
.secao-header { background:rgba(26,58,107,.6); padding:12px 18px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--borda); flex-wrap:wrap; gap:8px; }
.secao-titulo { font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:3px; color:var(--azul-neon); }
.secao-titulo.entradas { color:var(--verde); }
.secao-titulo.saidas-fixas { color:#f97316; }
.secao-titulo.saidas-var { color:var(--vermelho); }
.secao-body { padding:14px; }
.secao-header-btns { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }

/* ═══ TABELAS ═══ */
table { width:100%; border-collapse:collapse; font-size:.88rem; }
th { font-size:.65rem; letter-spacing:2px; text-transform:uppercase; color:var(--cinza); padding:7px 9px; text-align:left; border-bottom:1px solid var(--borda); }
td { padding:6px 9px; border-bottom:1px solid rgba(59,130,246,.08); vertical-align:middle; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:rgba(59,130,246,.06); }

/* ═══ INPUTS ═══ */
input[type="text"],input[type="number"],input[type="date"],select,textarea {
  background:rgba(10,22,40,.8); border:1px solid rgba(59,130,246,.3); border-radius:6px;
  color:var(--branco); font-family:'Rajdhani',sans-serif; font-size:.88rem; font-weight:500;
  padding:5px 9px; width:100%; transition:border-color .2s,box-shadow .2s; outline:none;
}
input[type="date"] { font-family:'Share Tech Mono',monospace; font-size:.78rem; color:var(--azul-neon); min-width:128px; cursor:pointer; }
input[type="date"]::-webkit-calendar-picker-indicator { filter:invert(.7) sepia(1) saturate(3) hue-rotate(180deg); cursor:pointer; }
input[type="text"]:focus,input[type="number"]:focus,input[type="date"]:focus,select:focus,textarea:focus { border-color:var(--azul-brilho); box-shadow:0 0 0 2px rgba(59,130,246,.15); }
select { cursor:pointer; }
select option { background:var(--azul-medio); }
input.valor { font-family:'Share Tech Mono',monospace; font-size:.83rem; color:#86efac; text-align:right; max-width:115px; }
input.valor-vermelho { color:#fca5a5; }
input.descricao-fixed { background:transparent; border-color:transparent; color:var(--branco); cursor:default; pointer-events:none; font-weight:600; }
textarea.obs-textarea { resize:vertical; min-height:70px; font-size:.85rem; color:var(--cinza); font-style:italic; }

/* ═══ CATEGORIA TAG ═══ */
.cat-tag { display:inline-block; padding:2px 8px; border-radius:12px; font-size:.65rem; letter-spacing:1px; font-weight:700; text-transform:uppercase; white-space:nowrap; }
.cat-peca    { background:rgba(59,130,246,.2);  color:var(--azul-neon); border:1px solid rgba(59,130,246,.4); }
.cat-servico { background:rgba(245,158,11,.15); color:var(--dourado);  border:1px solid rgba(245,158,11,.3); }
.cat-imposto { background:rgba(239,68,68,.15);  color:#fca5a5;          border:1px solid rgba(239,68,68,.3); }
.cat-combustivel { background:rgba(16,185,129,.15); color:#34d399; border:1px solid rgba(16,185,129,.3); }
.cat-outros  { background:rgba(148,163,184,.1); color:var(--cinza);    border:1px solid rgba(148,163,184,.2); }

/* ═══ BOTÕES ═══ */
.btn { display:inline-flex; align-items:center; gap:5px; padding:6px 14px; border-radius:7px; border:none; cursor:pointer; font-family:'Rajdhani',sans-serif; font-size:.8rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; transition:all .2s; }
.btn-add { background:rgba(59,130,246,.15); border:1px solid rgba(59,130,246,.4); color:var(--azul-neon); }
.btn-add:hover { background:rgba(59,130,246,.25); }
.btn-del { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); color:#fca5a5; padding:3px 9px; font-size:.73rem; }
.btn-del:hover { background:rgba(239,68,68,.2); }
.btn-save { background:linear-gradient(135deg,var(--azul-brilho),var(--azul-claro)); color:white; padding:9px 22px; font-size:.88rem; box-shadow:0 4px 16px rgba(59,130,246,.3); }
.btn-save:hover { transform:translateY(-1px); box-shadow:0 6px 24px rgba(59,130,246,.4); }
.btn-export { background:linear-gradient(135deg,var(--dourado),#d97706); color:#1a1a1a; padding:9px 22px; font-size:.88rem; }
.btn-export:hover { transform:translateY(-1px); box-shadow:0 6px 24px rgba(245,158,11,.3); }
.btn-pdf { background:linear-gradient(135deg,#dc2626,#b91c1c); color:white; padding:9px 22px; font-size:.88rem; }
.btn-pdf:hover { transform:translateY(-1px); box-shadow:0 6px 24px rgba(220,38,38,.3); }
.btn-duplic { background:rgba(16,185,129,.12); border:1px solid rgba(16,185,129,.3); color:#34d399; }
.btn-duplic:hover { background:rgba(16,185,129,.22); }
.btn-ordenar { background:rgba(245,158,11,.1); border:1px solid rgba(245,158,11,.3); color:var(--dourado); }
.btn-ordenar:hover { background:rgba(245,158,11,.2); }
.btn-sm { padding:3px 9px; font-size:.72rem; }

/* ═══ TOOLBAR ═══ */
.toolbar { display:flex; gap:8px; margin-bottom:18px; align-items:center; flex-wrap:wrap; }
.toolbar-right { margin-left:auto; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.save-status { font-size:.73rem; color:var(--verde); letter-spacing:1px; opacity:0; transition:opacity .3s; }
.save-status.visible { opacity:1; }
.save-status.salvando { color:var(--dourado); opacity:1; }

/* ═══ OBS MÊS ═══ */
.obs-mes-wrap { background:rgba(13,35,71,.5); border:1px solid var(--borda); border-radius:10px; padding:14px 18px; margin-bottom:20px; }
.obs-mes-label { font-size:.68rem; letter-spacing:2.5px; text-transform:uppercase; color:var(--cinza); margin-bottom:8px; }

/* ═══ GRÁFICO ═══ */
.chart-wrap { background:rgba(13,35,71,.7); border:1px solid var(--borda); border-radius:12px; padding:20px; margin-bottom:22px; }
.chart-title { font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:3px; color:var(--dourado); margin-bottom:16px; }
.chart-bars { display:flex; align-items:flex-end; gap:6px; height:160px; overflow-x:auto; padding-bottom:4px; }
.chart-col { display:flex; flex-direction:column; align-items:center; gap:3px; min-width:52px; }
.chart-col-label { font-size:.62rem; color:var(--cinza); letter-spacing:1px; text-align:center; white-space:nowrap; }
.chart-bars-inner { display:flex; gap:3px; align-items:flex-end; height:140px; }
.bar { border-radius:4px 4px 0 0; min-height:3px; transition:height .5s ease; cursor:default; }
.bar-entrada { background:linear-gradient(to top,var(--azul-brilho),var(--azul-neon)); width:16px; }
.bar-saida   { background:linear-gradient(to top,#b91c1c,var(--vermelho)); width:16px; }
.bar-liquido { background:linear-gradient(to top,#059669,var(--verde)); width:16px; }
.chart-legend { display:flex; gap:14px; margin-top:10px; flex-wrap:wrap; }
.leg-item { display:flex; align-items:center; gap:5px; font-size:.7rem; color:var(--cinza); }
.leg-dot { width:10px; height:10px; border-radius:2px; }

/* ═══ FILTRO CATEGORIA ═══ */
.filtro-cat { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
.filtro-btn { padding:3px 11px; border-radius:12px; border:1px solid rgba(148,163,184,.25); background:transparent; color:var(--cinza); font-size:.7rem; font-family:'Rajdhani',sans-serif; font-weight:700; letter-spacing:1px; cursor:pointer; text-transform:uppercase; transition:all .2s; }
.filtro-btn.ativo { border-color:var(--azul-brilho); color:var(--azul-neon); background:rgba(59,130,246,.12); }

/* ═══ MODAL ═══ */
.modal-overlay { position:fixed; inset:0; z-index:9000; background:rgba(5,11,20,.85); display:flex; align-items:center; justify-content:center; animation:fadeIn .2s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal { background:linear-gradient(135deg,rgba(13,35,71,.98),rgba(26,58,107,.8)); border:1px solid rgba(59,130,246,.4); border-radius:14px; padding:36px 40px; width:420px; max-width:92vw; position:relative; box-shadow:0 0 60px rgba(59,130,246,.2); animation:modalEntrada .3s cubic-bezier(.34,1.56,.64,1); }
@keyframes modalEntrada { from{opacity:0;transform:scale(.92) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }
.modal::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; border-radius:14px 14px 0 0; background:linear-gradient(90deg,transparent,var(--azul-neon),var(--dourado),var(--azul-neon),transparent); }
.modal-titulo { font-family:'Bebas Neue',sans-serif; font-size:1.3rem; letter-spacing:4px; color:var(--azul-neon); margin-bottom:24px; }
.modal-campo { margin-bottom:16px; }
.modal-campo label { display:block; font-size:.68rem; letter-spacing:2px; text-transform:uppercase; color:var(--cinza); margin-bottom:7px; }
.modal-btns { display:flex; gap:10px; margin-top:24px; }
.btn-modal-ok { flex:1; padding:11px; background:linear-gradient(135deg,var(--azul-brilho),var(--azul-claro)); border:none; border-radius:8px; color:white; font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:3px; cursor:pointer; transition:all .2s; }
.btn-modal-ok:hover { transform:translateY(-1px); }
.btn-modal-cancel { flex:1; padding:11px; background:rgba(148,163,184,.1); border:1px solid rgba(148,163,184,.2); border-radius:8px; color:var(--cinza); font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:3px; cursor:pointer; transition:all .2s; }
.btn-modal-cancel:hover { background:rgba(148,163,184,.18); }

/* ═══ CONFIRM DELETE ═══ */
.confirm-overlay { position:fixed; inset:0; z-index:9500; background:rgba(5,11,20,.9); display:flex; align-items:center; justify-content:center; animation:fadeIn .15s ease; }
.confirm-box { background:linear-gradient(135deg,rgba(20,10,10,.98),rgba(60,20,20,.9)); border:1px solid rgba(239,68,68,.5); border-radius:12px; padding:28px 32px; width:360px; max-width:92vw; text-align:center; }
.confirm-box p { font-size:.95rem; color:var(--branco); margin-bottom:20px; letter-spacing:.5px; }
.confirm-box small { color:var(--cinza); font-size:.78rem; display:block; margin-bottom:20px; }
.confirm-btns { display:flex; gap:10px; justify-content:center; }
.btn-confirm-del { padding:10px 24px; background:linear-gradient(135deg,#dc2626,#b91c1c); border:none; border-radius:7px; color:white; font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:3px; cursor:pointer; }
.btn-confirm-cancel { padding:10px 24px; background:rgba(148,163,184,.12); border:1px solid rgba(148,163,184,.25); border-radius:7px; color:var(--cinza); font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:2px; cursor:pointer; }

/* ═══ ANUAL ═══ */
.anual-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:22px; }
.anual-card { background:rgba(13,35,71,.8); border:1px solid var(--borda); border-radius:12px; padding:18px; text-align:center; }
.anual-card .ac-label { font-size:.68rem; letter-spacing:2px; color:var(--cinza); margin-bottom:6px; }
.anual-card .ac-valor { font-family:'Share Tech Mono',monospace; font-size:1.5rem; }
.anual-card.saidas .ac-valor { color:var(--vermelho); }
.anual-card.bruto  .ac-valor { color:var(--azul-neon); }
.anual-card.liquido .ac-valor { color:var(--verde); }
.anual-table-wrap { background:rgba(13,35,71,.7); border:1px solid var(--borda); border-radius:12px; overflow:hidden; }
.anual-table-wrap table th { background:rgba(26,58,107,.6); }
.anual-table-wrap table td:first-child { font-weight:700; color:var(--azul-neon); letter-spacing:1px; }
.val-saida   { font-family:'Share Tech Mono',monospace; color:#fca5a5; }
.val-bruto   { font-family:'Share Tech Mono',monospace; color:var(--azul-neon); }
.val-liquido { font-family:'Share Tech Mono',monospace; }
.val-positivo { color:#86efac; }
.val-negativo { color:var(--vermelho); }
.anual-totais-row td { font-weight:700; background:rgba(26,58,107,.4); border-top:2px solid var(--borda); font-size:1rem; }

// LOGIN / LOGOUT — Firebase Authentication
// ═══════════════════════════════════════════
async function fazerLogin() {
  const email = document.getElementById('login-user').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const erro  = document.getElementById('login-erro');
  const btn   = document.querySelector('.btn-login');
  if (!email || !pass) {
    erro.textContent = '⚠ Preencha e-mail e senha';
    erro.classList.add('visivel');
    setTimeout(() => erro.classList.remove('visivel'), 3000);
    return;
  }
  btn.textContent = 'Entrando...';
  btn.disabled = true;
  try {
    await window._firebaseSignIn(window._auth, email, pass);
    erro.classList.remove('visivel');
    document.getElementById('login-screen').style.display = 'none';
    const app = document.getElementById('app');
    app.style.display = 'flex'; app.style.flexDirection = 'column'; app.style.minHeight = '100vh';
    inicializarDados();
    iniciarSession();
  } catch(e) {
    let msg = '⚠ E-mail ou senha incorretos';
    if (e.code === 'auth/too-many-requests') msg = '⚠ Muitas tentativas. Tente mais tarde.';
    if (e.code === 'auth/network-request-failed') msg = '⚠ Sem conexão com a internet';
    erro.textContent = msg;
    erro.classList.add('visivel');
    document.getElementById('login-pass').value = '';
    document.getElementById('login-pass').focus();
    setTimeout(() => erro.classList.remove('visivel'), 4000);
  } finally {
    btn.textContent = 'Entrar';
    btn.disabled = false;
  }
}

async function fazerLogout(timeout) {
  clearInterval(sessionInterval);
  try { await window._firebaseSignOut(window._auth); } catch(e) {}
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  if (timeout) {
    const erro = document.getElementById('login-erro');
    erro.textContent = '⏱ Sessão expirada por inatividade';
    erro.classList.add('visivel');
    setTimeout(() => { erro.classList.remove('visivel'); erro.textContent = '⚠ E-mail ou senha incorretos'; }, 4000);
  }
}

function alternarCadastro() {
  const area = document.getElementById('cadastro-area');
  const aberto = area.style.display !== 'none';
  area.style.display = aberto ? 'none' : 'block';
  document.querySelector('.btn-criar').textContent = aberto ? '➕ Criar conta' : '✕ Cancelar';
}

async function criarConta() {
  const email = document.getElementById('cad-email').value.trim();
  const senha = document.getElementById('cad-senha').value;
  const conf  = document.getElementById('cad-conf').value;
  const erro  = document.getElementById('cad-erro');
  const btn   = document.querySelector('#cadastro-area .btn-login');

  erro.style.display = 'none';
  if (!email || !senha || !conf) { erro.textContent = '⚠ Preencha todos os campos'; erro.style.display='block'; return; }
  if (senha.length < 6) { erro.textContent = '⚠ Senha deve ter ao menos 6 caracteres'; erro.style.display='block'; return; }
  if (senha !== conf) { erro.textContent = '⚠ As senhas não coincidem'; erro.style.display='block'; return; }

  btn.textContent = 'Cadastrando...';
  btn.disabled = true;
  try {
    const { createUserWithEmailAndPassword } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
    await createUserWithEmailAndPassword(window._auth, email, senha);
    mostrarToast('✓ Conta criada! Fazendo login...');
    // Login automático após cadastro
    document.getElementById('login-user').value = email;
    document.getElementById('login-pass').value = senha;
    alternarCadastro();
    fazerLogin();
  } catch(e) {
    let msg = '⚠ Erro ao criar conta';
    if (e.code === 'auth/email-already-in-use') msg = '⚠ E-mail já cadastrado';
    if (e.code === 'auth/invalid-email') msg = '⚠ E-mail inválido';
    if (e.code === 'auth/weak-password') msg = '⚠ Senha muito fraca';
    erro.textContent = msg; erro.style.display = 'block';
    btn.textContent = 'Cadastrar';
    btn.disabled = false;
  }
}

function iniciarSession() {
  clearInterval(sessionInterval);

    const m = Math.floor(sessionSecondsLeft / 60);
    const s = sessionSecondsLeft % 60;

    if (el) el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

let dados = {};
let abaAtiva = new Date().getMonth(); // inicia no mês atual

function chaveStorage() {
  return `zlmotos_${document.getElementById('anoGlobal')?.value||'2025'}`;

function inicializarDadosLocal() {
  for (let m = 0; m < 12; m++) {
    if (!dados[m]) {
      dados[m] = { fixos: FIXOS_PADRAO.map(n => ({nome:n,valor:'',data:''})), variaveis:[], entradas:[], obs:'' };
    } else {
      dados[m].fixos.forEach(f => { if(!f.data) f.data=''; });
      dados[m].variaveis.forEach(v => { if(!v.data) v.data=''; if(!v.cat) v.cat='Outros'; });
      dados[m].entradas.forEach(e => { if(!e.data) e.data=''; });
      if(!dados[m].obs) dados[m].obs='';
    }
  }
}

async function inicializarDados() {
  try {
    const chave = chaveStorage();
    const ref = window._firestoreDoc(window._db, 'zlmotos', chave);
    const snap = await window._firestoreGetDoc(ref);
    if (snap.exists()) {
      dados = snap.data().dados || {};
    } else {
      dados = {};
    }
    // Carrega estoque e orçamentos do Firebase
    const refEst = window._firestoreDoc(window._db, 'zlmotos', 'estoque_global');
    const snapEst = await window._firestoreGetDoc(refEst);
    if (snapEst.exists()) estoque = snapEst.data().itens || [];

    const refOrcs = window._firestoreDoc(window._db, 'zlmotos', 'orcamentos_lista');
    const snapOrcs = await window._firestoreGetDoc(refOrcs);
    if (snapOrcs.exists()) orcamentos = snapOrcs.data().lista || [];

  } catch(e) {
    console.warn('Firestore indisponível:', e);
    mostrarErro('Sem conexão com o Firebase. Verifique a internet.');
    dados = {};
  }
  inicializarDadosLocal();
  catCarregarDoEstoque();
  renderAll();
}

let _saveTimer = null;
async function salvarDados() {
  const st = document.getElementById('saveStatus');
  if (st) { st.textContent = '⏳ Salvando...'; st.classList.add('salvando'); st.classList.remove('visible'); }

  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async () => {
    try {
      const chave = chaveStorage();
      const ref = window._firestoreDoc(window._db, 'zlmotos', chave);
      await window._firestoreSetDoc(ref, { dados: dados, atualizadoEm: new Date().toISOString() });
    } catch(e) {
      console.warn('Erro ao salvar no Firestore:', e);
      mostrarErro('Erro ao salvar — verifique sua conexão');
    }
    const st2 = document.getElementById('saveStatus');
    if (st2) {
      st2.textContent = '✓ SALVO';
      st2.classList.remove('salvando');
      st2.classList.add('visible');
      setTimeout(() => st2.classList.remove('visible'), 2000);
    }
  }, 800);
}

// ═══════════════════════════════════════════
// FORMATAÇÃO / CÁLCULOS
// ═══════════════════════════════════════════
function fmt(v) {
  const n = parseFloat(v)||0;
  return 'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function num(v) { return parseFloat(v)||0; }

function calcularMes(m) {
  const mes = dados[m];
  const totalFixos = mes.fixos.reduce((s,f) => s+num(f.valor),0);
  const totalVar   = mes.variaveis.reduce((s,v) => s+num(v.valor),0);
  const totalSaidas = totalFixos+totalVar;
  const totalBruto  = mes.entradas.reduce((s,e) => s+num(e.valor),0);
  const totalLiquido = totalBruto-totalSaidas;
  const vazio = totalSaidas===0 && totalBruto===0;
  return { totalFixos, totalVar, totalSaidas, totalBruto, totalLiquido, vazio };
}

function tendencia(m) {
  if (m === 0) return null;
  const atual = calcularMes(m).totalLiquido;
  const ant   = calcularMes(m-1).totalLiquido;
  if (ant === 0) return null;
  const pct = ((atual-ant)/Math.abs(ant)*100).toFixed(1);
  return { pct, up: atual >= ant };
}

}

// ═══════════════════════════════════════════
// RECALCULAR (sem re-render)
// ═══════════════════════════════════════════
function recalcular(m) {
  const calc = calcularMes(m);
  const s = (id,v) => { const el=document.getElementById(id); if(el) el.textContent=v; };
  s('card-saidas',fmt(calc.totalSaidas));
  s('card-bruto',fmt(calc.totalBruto));
  s('card-liquido',fmt(calc.totalLiquido));
  s('total-entradas',fmt(calc.totalBruto));
  s('total-fixos',fmt(calc.totalFixos));
  s('total-variaveis',fmt(calc.totalVar));
  const liq = document.getElementById('card-liquido');
  if (liq) {
    liq.style.color = calc.totalLiquido>=0?'var(--verde)':'var(--vermelho)';
    liq.classList.toggle('card-liquido-pos', calc.totalLiquido >= 0);
    liq.classList.toggle('card-liquido-neg', calc.totalLiquido < 0);
  }
  salvarDados();
}

// ═══════════════════════════════════════════
// QUALIDADE DE VIDA — Enter navega campos / formato valor
// ═══════════════════════════════════════════
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  const tag = e.target.tagName;
  if (tag !== 'INPUT' && tag !== 'SELECT') return;
  e.preventDefault();
  // Pega todos os inputs/selects editáveis da tabela
  const todos = Array.from(document.querySelectorAll(
    'input[type="text"], input[type="number"], input[type="date"], select'
  )).filter(el => !el.disabled && !el.readOnly && el.offsetParent !== null);
  const idx = todos.indexOf(e.target);
  if (idx >= 0 && idx < todos.length - 1) {
    todos[idx + 1].focus();
    if (todos[idx + 1].select) todos[idx + 1].select();
  }
});

// Formata valor ao sair do campo (blur)
document.addEventListener('blur', function(e) {
  if (!e.target.classList.contains('valor')) return;
  const v = parseFloat(e.target.value);
  if (!isNaN(v) && v > 0) {
    e.target.value = v.toFixed(2);
  }
}, true);
function hojeISO() {
  return new Date().toISOString().split('T')[0];
}

function addEntrada(m) {
  dados[m].entradas.push({data: hojeISO(), desc:'', valor:''});
  salvarDados();
  renderAll();
  // Foca na descrição da nova linha
  setTimeout(() => {
    const rows = document.querySelectorAll('#tbody-entradas tr');
    if (rows.length) {
      const last = rows[rows.length - 1];
      const input = last.querySelector('input[type="text"]');
      if (input) input.focus();
    }
  }, 50);
}
function removeEntrada(m,i){ dados[m].entradas.splice(i,1); salvarDados(); renderAll(); }

function addVariavel(m) {
  dados[m].variaveis.push({data: hojeISO(), desc:'', cat:'Outros', valor:''});
  salvarDados();
  renderAll();
  setTimeout(() => {
    const rows = document.querySelectorAll('#tbody-variaveis tr');
    if (rows.length) {
      const last = rows[rows.length - 1];
      const input = last.querySelector('input[type="text"]');
      if (input) input.focus();
    }
  }, 50);
}
function removeVariavel(m,i){ dados[m].variaveis.splice(i,1); salvarDados(); renderAll(); }

function ordenarSalvar(m, campo) {
  dados[m][campo].sort((a,b) => {
    const da = a.data||''; const db = b.data||'';
    if(!da&&!db) return 0; if(!da) return 1; if(!db) return -1;
    return da.localeCompare(db);
  });
  salvarDados(); renderAll();
}

function duplicarFixosMesAnterior(m) {
  if (m === 0) { mostrarToast('Janeiro não possui mês anterior.'); return; }
  const ant = dados[m-1].fixos;
  dados[m].fixos = ant.map(f => ({ ...f, data:'' }));
  salvarDados(); renderAll();
  mostrarToast('✓ Saídas fixas copiadas de ' + MESES[m-1]);
}

function exportarCSV(m) {
  const mes=dados[m]; const calc=calcularMes(m);
  const ano=document.getElementById('anoGlobal').value;
  let csv=`ZL MOTOS - ${MESES[m]} ${ano}\n\n`;
  csv+=`ENTRADAS\nData,Descrição,Valor\n`;
  mes.entradas.forEach(e=>{csv+=`"${e.data||''}","${e.desc||''}",${e.valor||0}\n`;});
  csv+=`,,Total Bruto,${calc.totalBruto}\n\nSAÍDAS FIXAS\nData,Descrição,Valor\n`;
  mes.fixos.forEach(f=>{csv+=`"${f.data||''}","${f.nome}",${f.valor||0}\n`;});
  csv+=`\nSAÍDAS VARIÁVEIS\nData,Descrição,Categoria,Valor\n`;
  mes.variaveis.forEach(v=>{csv+=`"${v.data||''}","${v.desc||''}","${v.cat||''}",${v.valor||0}\n`;});
  csv+=`\nRESUMO\nTotal Saídas,${calc.totalSaidas}\nLucro Bruto,${calc.totalBruto}\nLucro Líquido,${calc.totalLiquido}\n`;
  if (mes.obs) csv += `\nOBSERVAÇÕES\n"${mes.obs}"\n`;
  baixarArquivo(csv,`ZL_MOTOS_${MESES[m]}_${ano}.csv`,'text/csv');
}
function exportarCSVAnual() {
  const ano=document.getElementById('anoGlobal').value;
  let csv=`ZL MOTOS - Resumo Anual ${ano}\n\nMês,Total Saídas,Lucro Bruto,Lucro Líquido\n`;
  let ts=0,tb=0;
  MESES.forEach((mes,m)=>{ const c=calcularMes(m); ts+=c.totalSaidas; tb+=c.totalBruto; csv+=`${mes},${c.totalSaidas},${c.totalBruto},${c.totalLiquido}\n`; });
  csv+=`TOTAL,${ts},${tb},${tb-ts}\n`;
  baixarArquivo(csv,`ZL_MOTOS_Anual_${ano}.csv`,'text/csv');
}
function baixarArquivo(conteudo,nome,tipo) {
  const blob=new Blob(['\uFEFF'+conteudo],{type:tipo});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=nome; a.click(); URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
// ═══════════════════════════════════════════
// ORÇAMENTO — temporário, sem salvar
// ═══════════════════════════════════════════
let orcAtual = {
  cliente: '', telefone: '', veiculo: '', data: hojeISO(),
  itens: [],
  descTipo: 'percentual', descValor: '',
  obs: '',
  autorizaRodagem: false
};

// Lista de orçamentos salvos
let orcamentos = [];

async function orcSalvar() {
  if (!orcAtual.cliente.trim()) { mostrarErro('Informe o nome do cliente para salvar'); return; }
  // Deep copy garante que itens são salvos corretamente
  const orc = {
    ...JSON.parse(JSON.stringify(orcAtual)),
    id: orcAtual._id || ('orc_' + Date.now()),
    criadoEm: orcAtual._criadoEm || new Date().toISOString(),
    atualizadoEm: new Date().toISOString(),
    status: orcAtual.status || 'pendente',
    calc: orcCalc()
  };
  orcAtual._id = orc.id;
  orcAtual._criadoEm = orc.criadoEm;
  orcAtual.status = orc.status;
  const idx = orcamentos.findIndex(o => o.id === orc.id);
  if (idx >= 0) orcamentos[idx] = orc;
  else orcamentos.unshift(orc);
  try {
    const ref = window._firestoreDoc(window._db, 'zlmotos', 'orcamentos_lista');
    await window._firestoreSetDoc(ref, { lista: orcamentos, atualizadoEm: new Date().toISOString() });
    mostrarToast('✓ Orçamento salvo!');
  } catch(e) {
    mostrarErro('Erro ao salvar orçamento no Firebase');
  }
  renderOrcamento();
}

async function orcSetStatus(id, status) {
  const orc = orcamentos.find(o => o.id === id);
  if (!orc) return;
  const eraAceito = orc.status === 'aceito';
  orc.status = status;
  if (orcAtual._id === id) orcAtual.status = status;
  // Dar baixa no estoque ao aceitar (só uma vez)
  if (status === 'aceito' && !eraAceito && orc.itens && orc.itens.length > 0) {
    await orcDarBaixaEstoque(orc.itens);
  }
  const ref = window._firestoreDoc(window._db, 'zlmotos', 'orcamentos_lista');
  window._firestoreSetDoc(ref, { lista: orcamentos, atualizadoEm: new Date().toISOString() });
  renderOrcamento();
}

function orcCarregar(id) {
  const orc = orcamentos.find(o => o.id === id);
  if (!orc) return;
  // Deep copy para garantir que itens e todos campos são restaurados
  orcAtual = JSON.parse(JSON.stringify(orc));
  // Garantir campos obrigatórios
  if (!orcAtual.itens) orcAtual.itens = [];
  if (!orcAtual.descTipo) orcAtual.descTipo = 'percentual';
  if (!orcAtual.descValor) orcAtual.descValor = '';
  if (!orcAtual.obs) orcAtual.obs = '';
  if (!orcAtual.telefone) orcAtual.telefone = '';
  if (orcAtual.autorizaRodagem === undefined) orcAtual.autorizaRodagem = false;
  catBusca = '';
  renderOrcamento();
  mostrarToast('✓ Orçamento carregado — ' + orcAtual.itens.length + ' item(s)');
}

function orcExcluirSalvo(id) {
  const orc = orcamentos.find(o => o.id === id);
  if (!orc) return;
  confirmarExclusao(orc.cliente, async () => {
    orcamentos = orcamentos.filter(o => o.id !== id);
    if (orcAtual._id === id) orcNovoOrcamento();
    try {
      const ref = window._firestoreDoc(window._db, 'zlmotos', 'orcamentos_lista');
      await window._firestoreSetDoc(ref, { lista: orcamentos, atualizadoEm: new Date().toISOString() });
      mostrarToast('✓ Orçamento excluído');
    } catch(e) {}
    renderOrcamento();
  });
}

function orcDiasDesde(iso) {
  if (!iso) return 0;
  const d = new Date(iso);
  return Math.floor((Date.now() - d.getTime()) / (1000*60*60*24));
}

function orcStatusBadge(orc) {
  const dias = orcDiasDesde(orc.criadoEm);
  const vencido = orc.status !== 'aceito' && dias > 15;
  if (orc.status === 'aceito') return `<span style="background:rgba(16,185,129,.2);border:1px solid rgba(16,185,129,.4);color:#34d399;padding:2px 8px;border-radius:10px;font-size:.65rem;letter-spacing:1px">✓ ACEITO</span>`;
  if (vencido) return `<span style="background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.4);color:#fca5a5;padding:2px 8px;border-radius:10px;font-size:.65rem;letter-spacing:1px">⛔ EXPIRADO</span>`;
  if (orc.status === 'enviado') return `<span style="background:rgba(96,165,250,.2);border:1px solid rgba(96,165,250,.4);color:var(--azul-neon);padding:2px 8px;border-radius:10px;font-size:.65rem;letter-spacing:1px">📤 ENVIADO</span>`;
  return `<span style="background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:var(--dourado);padding:2px 8px;border-radius:10px;font-size:.65rem;letter-spacing:1px">⏳ PENDENTE</span>`;
}

function orcCalc() {
  const totalItens = orcAtual.itens.reduce((s, it) => s + (parseFloat(it.qtd)||0) * (parseFloat(it.vunit)||0), 0);
  const subtotal = totalItens;
  let descValorNum = 0;
  if (orcAtual.descTipo === 'percentual') {
    descValorNum = subtotal * ((parseFloat(orcAtual.descValor)||0) / 100);
  } else {
    descValorNum = parseFloat(orcAtual.descValor) || 0;
  }
  const total = Math.max(0, subtotal - descValorNum);
  return { totalItens, descValorNum, subtotal, total };
}

function orcPDF() {
  if (!orcAtual.cliente.trim()) { mostrarErro('Informe o nome do cliente'); return; }

  // Header

  doc.text('ZL MOTOS',W/2,13,{align:'center'});

  doc.text('ORÇAMENTO DE SERVIÇOS',W/2,21,{align:'center'});
  doc.setFontSize(7.5);
  doc.text(`Data: ${fmtData(dataOrc)}   |   Validade: ${fmtData(dataVenc)}`,W/2,28,{align:'center'});
  y = 42;

  // Info cliente
  doc.setFillColor(13,35,71); doc.roundedRect(14,y,55,20,3,3,'F');
  doc.roundedRect(75,y,65,20,3,3,'F');
  doc.roundedRect(146,y,50,20,3,3,'F');
  doc.setFontSize(7); doc.setTextColor(148,163,184);
  doc.text('CLIENTE', 20, y+6); doc.text('VEÍCULO / MODELO', 81, y+6); doc.text('TELEFONE', 152, y+6);
  doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(240,246,255);
  doc.text(orcAtual.cliente||'—', 20, y+15, {maxWidth:44});
  doc.text(orcAtual.veiculo||'—', 81, y+15, {maxWidth:54});
  doc.text(orcAtual.telefone||'—', 152, y+15, {maxWidth:40});
  y += 30;

  // Tabela itens — separar peças de mão de obra
  doc.setFillColor(26,58,107); doc.rect(14,y,182,8,'F');
  doc.setFontSize(7.5); doc.setFont('helvetica','bold'); doc.setTextColor(255,255,255);
  doc.text('DESCRIÇÃO', 16, y+5.5);
  doc.text('CAT.', 100, y+5.5);
  doc.text('QTD', 122, y+5.5, {align:'right'});
  doc.text('V. UNIT.', 155, y+5.5, {align:'right'});
  doc.text('SUBTOTAL', 196, y+5.5, {align:'right'});
  y += 11;

  doc.setFont('helvetica','normal'); doc.setFontSize(8.5);
  orcAtual.itens.forEach((it, i) => {
    if (y > 220) { doc.addPage(); y = 20; }
    const sub = (parseFloat(it.qtd)||0)*(parseFloat(it.vunit)||0);
    doc.setTextColor(i%2===0?[200,220,255]:[180,200,240]);
    if (i%2===0) { doc.setFillColor(13,35,71); doc.rect(14,y-3,182,7,'F'); }
    doc.text(it.desc||'—', 16, y+1, {maxWidth:80});
    doc.setFontSize(7); doc.setTextColor(148,163,184);
    doc.text(it.cat||'', 100, y+1);
    doc.setFontSize(8.5); doc.setTextColor(i%2===0?[200,220,255]:[180,200,240]);
    doc.text(String(it.qtd||1), 122, y+1, {align:'right'});

    doc.setTextColor(134,239,172);
    doc.text(fmtNum(sub), 196, y+1, {align:'right'});
    if (it.obs) {
      y += 6;
      doc.setFontSize(7); doc.setTextColor(148,163,184); doc.setFont('helvetica','italic');
      doc.text('  ' + it.obs, 16, y+1, {maxWidth:180});

    }
    y += 8;
    doc.setDrawColor(20,40,80); doc.line(14,y-2,196,y-2);
  });

  // Totais
  y += 4;
  doc.setFillColor(13,35,71); doc.roundedRect(120,y,76,calc.descValorNum>0?30:22,3,3,'F');
  doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(148,163,184);
  doc.text('Subtotal:', 124, y+7); doc.setTextColor(96,165,250); doc.setFont('helvetica','bold');
  doc.text(fmtNum(calc.totalItens), 194, y+7, {align:'right'});

    '• O cliente autoriza a realização de testes de funcionamento e rodagem do veículo pelo mecânico responsável, em percurso compatível com a verificação dos serviços executados.',
    '• Após a conclusão dos serviços e comunicação ao cliente, o veículo deverá ser retirado no prazo máximo de 15 (quinze) dias corridos.',
    '• Caso o veículo não seja retirado dentro do prazo e não haja acordo prévio com a oficina, será cobrada taxa de estadia no valor de R$ 10,00 (dez reais) por dia, referente à utilização do espaço para guarda do veículo.',
  ];
  termos.forEach(t => {
    if (y > 270) { doc.addPage(); y = 20; }
    const lines = doc.splitTextToSize(t, 182);
    doc.text(lines, 14, y);
    y += lines.length * 4.5 + 1;
  });

  // Assinatura e checkbox rodagem
  y += 4;
  if (y > 260) { doc.addPage(); y = 20; }
  doc.setFontSize(7); doc.setTextColor(148,163,184);

  // Checkbox autorização rodagem
  const checked = orcAtual.autorizaRodagem;
  doc.setDrawColor(96,165,250); doc.setLineWidth(0.5);
  doc.rect(14, y-4, 5, 5);
  if (checked) {
    doc.setTextColor(52,211,153); doc.setFontSize(8); doc.setFont('helvetica','bold');
    doc.text('✓', 14.8, y);

  doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(148,163,184);
  doc.text('Autorizo o teste de rodagem do veículo pelo mecânico responsável.', 21, y);
  y += 10;

  // Linha de assinatura
  doc.setLineWidth(0.3); doc.setDrawColor(60,90,120);
  doc.line(14, y, 95, y);
  doc.line(115, y, 196, y);
  doc.setFontSize(6.5); doc.setTextColor(100,120,150);
  doc.text('Assinatura do Cliente', 14, y+5);
  doc.text('Assinatura do Responsável', 115, y+5);

  // Rodapé com imagem
  try {
    if (window._rodapeImgB64) {
      const imgW = 55; const imgH = 62;
      doc.addImage('data:image/' + (window._rodapeImgMime||'png').toLowerCase() + ';base64,' + window._rodapeImgB64, window._rodapeImgMime||'PNG', W/2 - imgW/2, 232, imgW, imgH);
    }
  } catch(e) {}
  doc.setFontSize(7); doc.setTextColor(60,90,130); doc.setFont('helvetica','normal');
  doc.text('ZL MOTOS — Orçamento gerado em ' + new Date().toLocaleDateString('pt-BR'), W/2, 297, {align:'center'});

  const nomeArq = `ZL_MOTOS_Orc_${(orcAtual.cliente||'cliente').replace(/\s+/g,'_')}.pdf`;
  doc.save(nomeArq);
}

// ═══════════════════════════════════════════
// CATÁLOGO DE PEÇAS
// ═══════════════════════════════════════════
// Catálogo carregado do Firebase (integrado ao estoque)
let catalogoPecas = [];

function catCarregarDoEstoque() {
  // Sincroniza catálogo com peças do estoque
  const pecasEstoque = estoque.map(p => ({
    nome: p.nome,
    cat: p.cat || 'Outros',
    preco: p.venda || ''
  }));
  // Mantém itens manuais do catálogo que não estão no estoque
  const nomesEstoque = pecasEstoque.map(p => p.nome.toLowerCase());
  const manuais = catalogoPecas.filter(p => p._manual && !nomesEstoque.includes(p.nome.toLowerCase()));
  catalogoPecas = [...pecasEstoque, ...manuais];
}

let catBusca = '';

function catSalvar() {
  // Catálogo agora é derivado do estoque — salvar apenas itens manuais (_manual)
  const manuais = catalogoPecas.filter(p => p._manual);
  localStorage.setItem('zlmotos_catalogo_manuais', JSON.stringify(manuais));
}

function catFiltradas() {
  if (!catBusca.trim()) return catalogoPecas;
  const b = catBusca.toLowerCase();
  return catalogoPecas.filter(p => p.nome.toLowerCase().includes(b) || p.cat.toLowerCase().includes(b));
}

function orcAddFromCatalog(idx) {
  const peca = catalogoPecas[idx];
  if (!peca) return;
  // Verificar estoque disponível
  const itemEstoque = estoque.find(p => p.nome.toLowerCase() === peca.nome.toLowerCase());
  if (itemEstoque !== undefined) {
    const qtdDisp = parseFloat(itemEstoque.qtd) || 0;
    if (qtdDisp <= 0) {
      mostrarErro('⛔ ' + peca.nome + ' está zerado no estoque!');
      return;
    }
  }
  orcAtual.itens.push({ desc: peca.nome, cat: 'Peça', qtd: '1', vunit: peca.preco || '', obs: '', _estoqueNome: peca.nome });
  renderOrcamento();
  mostrarToast('✓ ' + peca.nome + ' adicionada!');
  setTimeout(() => {
    const busca = document.getElementById('cat-busca');
    if (busca) { busca.value = catBusca; busca.focus(); }
  }, 50);
}

// Dá baixa no estoque quando orçamento é aceito
async function orcDarBaixaEstoque(itens) {
  let alterou = false;
  itens.forEach(it => {
    if (!it._estoqueNome && !it.desc) return;
    const nome = it._estoqueNome || it.desc;
    const idx = estoque.findIndex(p => p.nome.toLowerCase() === nome.toLowerCase());
    if (idx >= 0) {
      const qtdAtual = parseFloat(estoque[idx].qtd) || 0;
      const qtdUsar  = parseFloat(it.qtd) || 1;
      estoque[idx].qtd = Math.max(0, qtdAtual - qtdUsar);
      alterou = true;
    }
  });
  if (alterou) {
    await estSalvar();
    mostrarToast('✓ Estoque atualizado automaticamente');
  }
}

function renderCatalogo() {
  const lista = catFiltradas();
  const cats = [...new Set(catalogoPecas.map(p => p.cat))];

  if (lista.length === 0) {
    return `<div class="orc-catalogo-vazio">Nenhuma peça encontrada. Cadastre peças no Estoque para elas aparecerem aqui.</div>`;
  }

  function pecaItem(p, realIdx) {
    const itemEst = estoque.find(e => e.nome.toLowerCase() === p.nome.toLowerCase());
    const semEstoque = itemEst && (parseFloat(itemEst.qtd)||0) <= 0;
    const qtdDisp = itemEst ? (parseFloat(itemEst.qtd)||0) : null;
    const estBadge = semEstoque
      ? `<span style="background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.4);color:#fca5a5;font-size:.55rem;padding:1px 5px;border-radius:8px;white-space:nowrap">⛔ Zerado</span>`
      : qtdDisp !== null
        ? `<span style="background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#34d399;font-size:.55rem;padding:1px 5px;border-radius:8px;white-space:nowrap">Qtd: ${qtdDisp}</span>`
        : '';
    const style = semEstoque ? 'opacity:.5;cursor:not-allowed' : '';
    return `<div class="orc-peca-item" onclick="orcAddFromCatalog(${realIdx})" style="${style}">
      <div style="flex:1;min-width:0">
        <div class="orc-peca-nome">${p.nome}</div>
        <div style="display:flex;gap:5px;align-items:center;margin-top:2px">
          ${p.preco ? `<span class="orc-peca-preco">R$ ${parseFloat(p.preco).toLocaleString('pt-BR',{minimumFractionDigits:2})}</span>` : ''}
          ${estBadge}
        </div>
      </div>
      <div class="orc-peca-add-btn" style="${semEstoque?'opacity:.3':''}">+</div>
    </div>`;
  }

  if (catBusca.trim()) {
    return lista.map(p => pecaItem(p, catalogoPecas.indexOf(p))).join('');
  }

  return cats.map(cat => {
    const pecasCat = catalogoPecas.filter(p => p.cat === cat);
    if (!pecasCat.length) return '';
    return `<div class="orc-cat-group-label">📦 ${cat}</div>` +
      pecasCat.map(p => pecaItem(p, catalogoPecas.indexOf(p))).join('');
  }).join('');
}

  const opts = cats.map(c => `<option value="${c}">${c}</option>`).join('');

  ov.className = 'cat-modal-overlay';

  ov.innerHTML = `

function salvarNovaPeca(editIdx) {
  const nome = (document.getElementById('cat-nome').value || '').trim();
  if (!nome) { mostrarErro('Informe o nome da peça'); return; }
  let cat = document.getElementById('cat-cat').value;
  if (cat === '__nova__') {
    cat = (document.getElementById('cat-nova-cat').value || '').trim() || 'Outros';
  }
  const preco = document.getElementById('cat-preco').value || '';
  const novaPeca = { nome, cat, preco, _manual: true };
  if (editIdx !== undefined) {
    catalogoPecas[editIdx] = novaPeca;
    mostrarToast('✓ Peça atualizada!');
  } else {
    catalogoPecas.unshift(novaPeca);
    mostrarToast('✓ Peça adicionada ao catálogo!');
  }
  catSalvar();
  document.getElementById('cat-modal-overlay').remove();
  renderOrcamento();
}

function abrirGerenciarCatalogo() {
  const ov = document.createElement('div');
  ov.className = 'cat-modal-overlay';
  ov.id = 'cat-modal-overlay';
  
  const linhas = catalogoPecas.map((p, i) => `
    <tr>
      <td style="font-weight:600;color:var(--branco)">${p.nome}</td>
      <td><span class="cat-tag cat-peca" style="font-size:.6rem">${p.cat}</span></td>
      <td style="font-family:'Share Tech Mono',monospace;color:#34d399">${p.preco ? 'R$ '+parseFloat(p.preco).toLocaleString('pt-BR',{minimumFractionDigits:2}) : '—'}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-del btn-sm" onclick="catExcluir(${i})">✕</button>
      </td>
    </tr>`).join('');

  ov.innerHTML = `
    <div class="cat-modal" style="width:560px;max-height:80vh;display:flex;flex-direction:column">
      <div class="cat-modal-titulo">📋 Gerenciar Catálogo</div>
      <div style="overflow-y:auto;flex:1;margin-bottom:14px">
        <table style="width:100%;font-size:.82rem">
          <thead><tr><th style="font-size:.62rem;letter-spacing:2px;color:var(--cinza);padding:6px 4px;text-align:left">Peça</th><th style="font-size:.62rem;letter-spacing:2px;color:var(--cinza);padding:6px 4px">Cat.</th><th style="font-size:.62rem;letter-spacing:2px;color:var(--cinza);padding:6px 4px">Preço</th><th></th></tr></thead>
          <tbody>${linhas}</tbody>
        </table>
        ${catalogoPecas.length===0?'<div class="orc-catalogo-vazio">Catálogo vazio</div>':''}
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn-cat-cancel" style="flex:1" onclick="document.getElementById('cat-modal-overlay').remove();renderOrcamento()">Fechar</button>
        <button class="btn-cat-ok" style="flex:1" onclick="document.getElementById('cat-modal-overlay').remove();abrirModalNovaPeca()">+ Nova Peça</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
}

function catExcluir(idx) {
  catalogoPecas.splice(idx, 1);
  catSalvar();
  document.getElementById('cat-modal-overlay').remove();
  abrirGerenciarCatalogo();
}

// SELEÇÃO DE ORÇAMENTO PARA PDF
// ═══════════════════════════════════════════
let orcSelecionadoId = null;

function orcSelecionarLinha(id, event) {
  // Não selecionar se clicou em botão
  if (event && event.target.tagName === 'BUTTON') return;
  orcSelecionadoId = orcSelecionadoId === id ? null : id;
  // Atualiza visual das linhas
  document.querySelectorAll('.orc-row-selecionavel').forEach(tr => {
    tr.classList.remove('orc-row-selecionado');
  });
  const hint = document.getElementById('orc-pdf-hint');
  const btnPdf = document.getElementById('btn-pdf-lista');
  if (orcSelecionadoId) {
    const row = document.querySelector(`tr[data-orcid="${orcSelecionadoId}"]`);
    if (row) row.classList.add('orc-row-selecionado');
    if (hint) { hint.textContent = '✓ Orçamento selecionado — clique em PDF'; hint.className = 'orc-pdf-hint pronto'; }
    if (btnPdf) { btnPdf.style.opacity = '1'; btnPdf.style.cursor = 'pointer'; btnPdf.disabled = false; }
  } else {
    if (hint) { hint.textContent = '👆 Selecione um orçamento para gerar PDF'; hint.className = 'orc-pdf-hint'; }
    if (btnPdf) { btnPdf.style.opacity = '.5'; btnPdf.style.cursor = 'not-allowed'; btnPdf.disabled = true; }
  }
}

function orcPDFSelecionado() {
  if (!orcSelecionadoId) { mostrarErro('Selecione um orçamento na lista antes de gerar o PDF'); return; }
  const orc = orcamentos.find(o => o.id === orcSelecionadoId);
  if (!orc) { mostrarErro('Orçamento não encontrado'); return; }
  // Salva orcAtual atual, substitui temporariamente para gerar PDF
  const backup = JSON.parse(JSON.stringify(orcAtual));
  orcAtual = JSON.parse(JSON.stringify(orc));
  orcAtual._id = orc.id;
  orcAtual._criadoEm = orc.criadoEm;
  try {
    orcPDF();
  } finally {
    orcAtual = backup;
  }
}

function atualizarCatalogo() {
  const el = document.getElementById('cat-lista');
  if (el) el.innerHTML = renderCatalogo();
}

function orcAtualizarSubtotais() {
  const calc = orcCalc();
  const fmtN = v => 'R$ ' + parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  orcAtual.itens.forEach((it, i) => {
    const sub = (parseFloat(it.qtd)||0) * (parseFloat(it.vunit)||0);
    const el = document.getElementById('orc-sub-'+i);
    if (el) el.textContent = fmtN(sub);
  });
  const tp = document.getElementById('orc-total-pecas');
  if (tp) tp.textContent = fmtN(calc.totalItens);
  orcAtualizarTotais();
}

function orcAtualizarTotais() {
  const calc = orcCalc();
  const fmtN = v => 'R$ ' + parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  const s = (id, v) => { const el=document.getElementById(id); if(el) el.textContent=v; };
  s('orc-c-pecas', fmtN(calc.totalItens));
  s('orc-c-desc', fmtN(calc.descValorNum));
  s('orc-c-total', fmtN(calc.total));
  s('orc-desc-preview', '= '+fmtN(calc.descValorNum));
  s('orc-total-pecas', fmtN(calc.totalItens));
}

const EST_CATS = ['Freio','Motor','Elétrica','Transmissão','Suspensão','Funilaria','Lubrificante','Outros'];
const EST_CAT_COLORS = {
  'Freio':'rgba(239,68,68,.18);color:#fca5a5;border-color:rgba(239,68,68,.4)',
  'Motor':'rgba(245,158,11,.15);color:var(--dourado);border-color:rgba(245,158,11,.35)',
  'Elétrica':'rgba(96,165,250,.18);color:var(--azul-neon);border-color:rgba(96,165,250,.4)',
  'Transmissão':'rgba(167,139,250,.15);color:#a78bfa;border-color:rgba(167,139,250,.35)',
  'Suspensão':'rgba(52,211,153,.15);color:#34d399;border-color:rgba(52,211,153,.35)',
  'Funilaria':'rgba(249,115,22,.15);color:#fb923c;border-color:rgba(249,115,22,.35)',
  'Lubrificante':'rgba(20,184,166,.15);color:#2dd4bf;border-color:rgba(20,184,166,.35)',
  'Outros':'rgba(148,163,184,.1);color:var(--cinza);border-color:rgba(148,163,184,.25)'
};

let estoque = [];
let estFiltroCAT = 'Todos';
let estBusca = '';
let estMostrarApenasAlerta = false;

async function estSalvar() {
  try {
    const ref = window._firestoreDoc(window._db, 'zlmotos', 'estoque_global');
    await window._firestoreSetDoc(ref, { itens: estoque, atualizadoEm: new Date().toISOString() });
    // Atualiza catálogo automaticamente
    catCarregarDoEstoque();
  } catch(e) {
    console.warn('Erro ao salvar estoque:', e);
    mostrarErro('Erro ao salvar estoque — verifique conexão');
  }
}

function estCalcResumo() {
  const total = estoque.length;
  const totalCusto = estoque.reduce((s,p) => s + (parseFloat(p.custo)||0)*(parseFloat(p.qtd)||0), 0);
  const totalVenda = estoque.reduce((s,p) => s + (parseFloat(p.venda)||0)*(parseFloat(p.qtd)||0), 0);
  const emAlerta = estoque.filter(p => (parseFloat(p.qtd)||0) <= (parseFloat(p.minimo)||0)).length;
  return { total, totalCusto, totalVenda, emAlerta };
}

function estFiltradas() {
  return estoque.filter(p => {
    const catOk = estFiltroCAT === 'Todos' || p.cat === estFiltroCAT;
    const buscaOk = !estBusca || p.nome.toLowerCase().includes(estBusca.toLowerCase());
    const alertaOk = !estMostrarApenasAlerta || (parseFloat(p.qtd)||0) <= (parseFloat(p.minimo)||0);
    return catOk && buscaOk && alertaOk;
  });
}

function estAbrirMovimento(idx) {
  const p = estoque[idx];
  const overlay = document.createElement('div');
  overlay.className = 'est-mov-overlay';
  overlay.id = 'est-mov-overlay';
  overlay.innerHTML = `
    <div class="est-mov-box">
      <div class="est-mov-titulo" style="color:var(--azul-neon)">📦 Movimentar Estoque</div>
      <div style="font-size:.88rem;color:var(--branco);margin-bottom:16px;font-weight:600">${p.nome}</div>
      <div style="font-size:.78rem;color:var(--cinza);margin-bottom:16px">Qtd atual: <span style="color:var(--azul-neon);font-family:'Share Tech Mono',monospace">${p.qtd||0}</span></div>
      <div class="est-tipo-btns">
        <button class="est-tipo-btn entrada ativo" id="est-btn-entrada" onclick="estToggleTipo('entrada')">▲ Entrada</button>
        <button class="est-tipo-btn saida" id="est-btn-saida" onclick="estToggleTipo('saida')">▼ Saída</button>
      </div>
      <div class="est-mov-campo">
        <label>Quantidade</label>
        <input type="number" id="est-mov-qtd" min="1" step="1" value="1" style="font-family:'Share Tech Mono',monospace;font-size:1.1rem;color:var(--azul-neon)"/>
      </div>
      <div class="est-mov-campo">
        <label>Motivo (opcional)</label>
        <input type="text" id="est-mov-motivo" placeholder="Ex: Compra fornecedor, Venda balcão..."/>
      </div>
      <div class="modal-btns">
        <button class="btn-modal-cancel" onclick="document.getElementById('est-mov-overlay').remove()">Cancelar</button>
        <button class="btn-modal-ok" onclick="estConfirmarMov(${idx})">Confirmar</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

let _estTipoMov = 'entrada';
function estToggleTipo(tipo) {
  _estTipoMov = tipo;
  document.getElementById('est-btn-entrada').classList.toggle('ativo', tipo==='entrada');
  document.getElementById('est-btn-saida').classList.toggle('ativo', tipo==='saida');
}

function estConfirmarMov(idx) {
  const qtd = parseInt(document.getElementById('est-mov-qtd').value) || 0;
  if (qtd <= 0) { mostrarErro('Informe uma quantidade válida'); return; }
  const p = estoque[idx];
  if (_estTipoMov === 'entrada') {
    p.qtd = (parseFloat(p.qtd)||0) + qtd;
  } else {
    const atual = parseFloat(p.qtd)||0;
    if (qtd > atual) { mostrarErro('Quantidade insuficiente em estoque'); return; }
    p.qtd = atual - qtd;
  }
  estSalvar();
  document.getElementById('est-mov-overlay').remove();
  mostrarToast(_estTipoMov === 'entrada' ? `✓ +${qtd} unidades adicionadas` : `✓ -${qtd} unidades removidas`);
  renderEstoque();
}

function estAbrirCadastro(idx) {
  const edicao = idx !== undefined;
  const p = edicao ? estoque[idx] : { nome:'', cat:'Freio', qtd:'', custo:'', venda:'', minimo:'' };
  const overlay = document.createElement('div');
  overlay.className = 'est-mov-overlay';
  overlay.id = 'est-cad-overlay';
  overlay.innerHTML = `
    <div class="est-mov-box" style="width:480px">
      <div class="est-mov-titulo" style="color:var(--dourado)">${edicao?'✏️ Editar Peça':'➕ Nova Peça'}</div>
      <div class="est-mov-campo">
        <label>Nome da Peça *</label>
        <input type="text" id="est-cad-nome" value="${(p.nome||'').replace(/"/g,'&quot;')}" placeholder="Ex: Pastilha de freio Honda Titan..."/>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="est-mov-campo">
          <label>Categoria</label>
          <select id="est-cad-cat">
            ${EST_CATS.map(c=>`<option value="${c}"${p.cat===c?' selected':''}>${c}</option>`).join('')}
          </select>
        </div>
        <div class="est-mov-campo">
          <label>Quantidade</label>
          <input type="number" id="est-cad-qtd" value="${p.qtd||''}" min="0" step="1" placeholder="0" style="font-family:'Share Tech Mono',monospace"/>
        </div>
        <div class="est-mov-campo">
          <label>Preço de Custo (R$)</label>
          <input type="number" id="est-cad-custo" value="${p.custo||''}" min="0" step="0.01" placeholder="0,00" style="font-family:'Share Tech Mono',monospace;color:#fca5a5"/>
        </div>
        <div class="est-mov-campo">
          <label>Preço de Venda (R$)</label>
          <input type="number" id="est-cad-venda" value="${p.venda||''}" min="0" step="0.01" placeholder="0,00" style="font-family:'Share Tech Mono',monospace;color:#34d399"/>
        </div>
      </div>
      <div class="est-mov-campo">
        <label>Estoque Mínimo (alerta abaixo disso)</label>
        <input type="number" id="est-cad-min" value="${p.minimo||''}" min="0" step="1" placeholder="Ex: 2" style="font-family:'Share Tech Mono',monospace;color:var(--dourado)"/>
      </div>
      <div class="modal-btns">
        <button class="btn-modal-cancel" onclick="document.getElementById('est-cad-overlay').remove()">Cancelar</button>
        <button class="btn-modal-ok" onclick="estConfirmarCadastro(${edicao?idx:'undefined'})">${edicao?'Salvar':'Cadastrar'}</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('est-cad-nome').focus();
}

function estConfirmarCadastro(idx) {
  const nome = document.getElementById('est-cad-nome').value.trim();
  if (!nome) { mostrarErro('Informe o nome da peça'); return; }
  const peca = {
    id: (idx !== undefined ? estoque[idx].id : null) || Date.now(),
    nome,
    cat: document.getElementById('est-cad-cat').value,
    qtd: parseFloat(document.getElementById('est-cad-qtd').value) || 0,
    custo: document.getElementById('est-cad-custo').value,
    venda: document.getElementById('est-cad-venda').value,
    minimo: document.getElementById('est-cad-min').value,
  };
  if (idx !== undefined) {
    estoque[idx] = peca;
    mostrarToast('✓ Peça atualizada!');
  } else {
    estoque.unshift(peca);
    mostrarToast('✓ Peça cadastrada!');
  }
  estSalvar();
  document.getElementById('est-cad-overlay').remove();
  renderEstoque();
}

function estExcluir(idx) {
  confirmarExclusao(estoque[idx].nome, () => {
    estoque.splice(idx, 1);
    estSalvar();
    renderEstoque();
  });
}

// ═══════════════════════════════════════════
// RENDER ESTOQUE
// ═══════════════════════════════════════════
function renderEstoque() {
  const main = document.getElementById('mainContent');
  const resumo = estCalcResumo();
  const lista = estFiltradas();
  const fmtN = v => 'R$ ' + parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});

  const rows = lista.map((p, visualIdx) => {
    const realIdx = estoque.indexOf(p);
    const qtd = parseFloat(p.qtd) || 0;
    const min = parseFloat(p.minimo) || 0;
    const custo = parseFloat(p.custo) || 0;
    const venda = parseFloat(p.venda) || 0;
    const margem = custo > 0 ? ((venda - custo) / custo * 100).toFixed(1) : null;
    const emAlerta = qtd <= min;
    const semEstoque = qtd === 0;
    const cc = EST_CAT_COLORS[p.cat] || EST_CAT_COLORS['Outros'];
    const statusBadge = semEstoque
      ? `<span class="est-zero-badge">⛔ Zerado</span>`
      : emAlerta
        ? `<span class="est-alerta-badge">⚠ Baixo</span>`
        : `<span class="est-ok-badge">✓ OK</span>`;
    const margemHtml = margem !== null
      ? `<span class="est-margem ${parseFloat(margem)>=0?'est-margem-pos':'est-margem-neg'}">${margem}%</span>`
      : `<span class="est-margem" style="color:var(--cinza)">—</span>`;

    return `<tr class="${emAlerta?'est-alerta-row':''}">
      <td data-label="Peça" style="font-weight:600;color:var(--branco)">${p.nome}</td>
      <td data-label="Categoria"><span class="est-cat-tag" style="background:${cc}">${p.cat}</span></td>
      <td class="col-qtd-est" data-label="Qtd" style="font-family:'Share Tech Mono',monospace;font-size:.95rem;color:${semEstoque?'var(--vermelho)':emAlerta?'var(--dourado)':'var(--azul-neon)'};font-weight:700">${qtd}</td>
      <td class="col-min" data-label="Mín" style="font-family:'Share Tech Mono',monospace;color:var(--cinza)">${min||'—'}</td>
      <td class="col-status" data-label="Status">${statusBadge}</td>
      <td class="col-custo" data-label="Custo">${custo>0?fmtN(custo):'—'}</td>
      <td class="col-venda" data-label="Venda">${venda>0?fmtN(venda):'—'}</td>
      <td class="col-margem" data-label="Margem">${margemHtml}</td>
      <td data-label="Ações" style="white-space:nowrap">
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          <button class="btn btn-sm" style="background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);color:var(--azul-neon)" onclick="estAbrirMovimento(${realIdx})">↕ Mov.</button>
          <button class="btn btn-sm btn-duplic" onclick="estAbrirCadastro(${realIdx})">✏️</button>
          <button class="btn btn-del btn-sm" onclick="estExcluir(${realIdx})">✕</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  const emAlertaTotal = resumo.emAlerta;

  main.innerHTML = `
    <div class="toolbar">
      <span style="font-family:'Bebas Neue';font-size:1.35rem;letter-spacing:3px;color:#f97316">📦 Estoque</span>
      ${emAlertaTotal>0?`<span class="est-alerta-badge" style="font-size:.72rem">⚠ ${emAlertaTotal} item${emAlertaTotal>1?'s':''} em alerta</span>`:''}
      <div class="toolbar-right">
        <button class="btn btn-add" onclick="estAbrirCadastro()">+ Nova Peça</button>
      </div>
    </div>

    <!-- CARDS RESUMO -->
    <div class="est-resumo">
      <div class="est-card total"><div class="est-card-label">Total de Itens</div><div class="est-card-valor">${resumo.total}</div></div>
      <div class="est-card custo"><div class="est-card-label">Valor em Custo</div><div class="est-card-valor">${fmtN(resumo.totalCusto)}</div></div>
      <div class="est-card venda"><div class="est-card-label">Valor em Venda</div><div class="est-card-valor">${fmtN(resumo.totalVenda)}</div></div>
      <div class="est-card alerta"><div class="est-card-label">Em Alerta / Zerado</div><div class="est-card-valor">${resumo.emAlerta}</div></div>
    </div>

    <!-- FILTROS -->
    <div class="est-filtros">
      <input type="text" class="est-busca" placeholder="🔍 Buscar peça..." value="${estBusca}" oninput="estBusca=this.value;renderEstoque()"/>
      <select style="max-width:160px" onchange="estFiltroCAT=this.value;renderEstoque()">
        <option value="Todos" ${estFiltroCAT==='Todos'?'selected':''}>Todas categorias</option>
        ${EST_CATS.map(c=>`<option value="${c}" ${estFiltroCAT===c?'selected':''}>${c}</option>`).join('')}
      </select>
      <button class="filtro-btn${estMostrarApenasAlerta?' ativo':''}" onclick="estMostrarApenasAlerta=!estMostrarApenasAlerta;renderEstoque()">⚠ Só alertas</button>
    </div>

    <!-- TABELA -->
    <div class="orc-lista">
      <div class="orc-lista-body" style="padding:0">
        ${lista.length === 0
          ? `<div class="orc-vazio">${estoque.length===0?'Nenhuma peça cadastrada ainda. Clique em "+ Nova Peça" para começar.':'Nenhuma peça encontrada com os filtros aplicados.'}</div>`
          : `<div style="overflow-x:auto"><table class="tabela-mobile">
              <thead><tr>
                <th>Peça</th><th>Categoria</th>
                <th class="col-qtd-est">Qtd</th>
                <th class="col-min">Mín</th>
                <th class="col-status">Status</th>
                <th class="col-custo">Custo</th>
                <th class="col-venda">Venda</th>
                <th class="col-margem">Margem</th>
                <th>Ações</th>
              </tr></thead>
              <tbody>${rows}</tbody>
            </table></div>`
        }
      </div>
    </div>
  `;
}
